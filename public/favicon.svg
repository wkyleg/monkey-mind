<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#080810" stroke="#00cccc" stroke-width="1.5"/>
  
  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Monkey face -->
  <g filter="url(#glow)">
    <!-- Main head -->
    <circle cx="16" cy="16" r="10" fill="#8B4513"/>
    
    <!-- Ears -->
    <circle cx="7" cy="11" r="4" fill="#00cccc"/>
    <circle cx="25" cy="11" r="4" fill="#00cccc"/>
    <circle cx="7" cy="11" r="2.5" fill="#8B4513"/>
    <circle cx="25" cy="11" r="2.5" fill="#8B4513"/>
    
    <!-- Face lighter area -->
    <ellipse cx="16" cy="18" rx="6" ry="5" fill="#a0522d"/>
    
    <!-- Eyes -->
    <circle cx="12" cy="14" r="2.5" fill="white"/>
    <circle cx="20" cy="14" r="2.5" fill="white"/>
    <circle cx="12" cy="14" r="1.2" fill="#00cccc"/>
    <circle cx="20" cy="14" r="1.2" fill="#00cccc"/>
    
    <!-- Nose -->
    <ellipse cx="16" cy="18" rx="2" ry="1.5" fill="#5d3a1a"/>
    
    <!-- Mouth (smile) -->
    <path d="M12 21 Q16 24 20 21" stroke="#5d3a1a" stroke-width="1" fill="none"/>
    
    <!-- Neural implant lines -->
    <path d="M8 6 L11 10" stroke="#00cccc" stroke-width="0.8"/>
    <path d="M24 6 L21 10" stroke="#00cccc" stroke-width="0.8"/>
    <circle cx="8" cy="6" r="1" fill="#00cccc"/>
    <circle cx="24" cy="6" r="1" fill="#00cccc"/>
  </g>
</svg>

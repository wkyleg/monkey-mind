<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Glitch Sprite - Tier 2 (Pattern/Digital) -->
  <defs>
    <radialGradient id="glitchGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#aa00aa"/>
    </radialGradient>
    <filter id="glitchGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Digital distortion fragments -->
  <rect x="4" y="16" width="8" height="3" fill="#00ffff" opacity="0.6"/>
  <rect x="36" y="20" width="6" height="2" fill="#ff00ff" opacity="0.6"/>
  <rect x="8" y="28" width="4" height="2" fill="#00ff00" opacity="0.5"/>
  <rect x="38" y="26" width="5" height="2" fill="#ff0066" opacity="0.5"/>
  
  <!-- Core body (glitching hexagon) -->
  <polygon points="24,6 38,15 38,33 24,42 10,33 10,15" 
           fill="url(#glitchGrad)" stroke="#ff00ff" stroke-width="2" 
           filter="url(#glitchGlow)"/>
  
  <!-- Glitch offset copies -->
  <polygon points="26,7 39,16 39,32 25,41 12,32 12,16" 
           fill="none" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
  <polygon points="22,8 36,17 36,34 22,43 9,34 9,17" 
           fill="none" stroke="#ff0066" stroke-width="1" opacity="0.4"/>
  
  <!-- Digital eyes (scanning) -->
  <rect x="16" y="20" width="6" height="4" fill="#00ffff"/>
  <rect x="26" y="20" width="6" height="4" fill="#00ffff"/>
  <!-- Scan lines in eyes -->
  <line x1="16" y1="21" x2="22" y2="21" stroke="#000033" stroke-width="1"/>
  <line x1="26" y1="21" x2="32" y2="21" stroke="#000033" stroke-width="1"/>
  <line x1="16" y1="23" x2="22" y2="23" stroke="#000033" stroke-width="1"/>
  <line x1="26" y1="23" x2="32" y2="23" stroke="#000033" stroke-width="1"/>
  
  <!-- Error mouth -->
  <rect x="18" y="30" width="12" height="3" fill="#ff0000"/>
  <text x="24" y="32.5" font-size="3" fill="#ffffff" text-anchor="middle" font-family="monospace">ERR</text>
  
  <!-- Motion trail (zigzag digital) -->
  <path d="M24 44 L20 46 L28 48 L24 50" stroke="#ff00ff" stroke-width="1" fill="none" opacity="0.5"/>
  <rect x="22" y="45" width="4" height="1" fill="#00ffff" opacity="0.3"/>
</svg>

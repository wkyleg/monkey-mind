<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Zigzag Cherub - Tier 2 (Pattern/Organic) -->
  <defs>
    <radialGradient id="cherubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaacc"/>
      <stop offset="100%" stop-color="#ff66aa"/>
    </radialGradient>
    <filter id="cherubGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Wings (feathered, flowing) -->
  <path d="M2 20 Q8 15 12 20 Q10 25 6 28 Q4 24 2 20" 
        fill="#ffccee" stroke="#ff66aa" stroke-width="1" opacity="0.8"/>
  <path d="M4 18 Q10 12 14 18" 
        fill="none" stroke="#ff66aa" stroke-width="1" opacity="0.6"/>
  <path d="M4 22 Q8 18 12 22" 
        fill="none" stroke="#ff66aa" stroke-width="1" opacity="0.6"/>
  
  <path d="M46 20 Q40 15 36 20 Q38 25 42 28 Q44 24 46 20" 
        fill="#ffccee" stroke="#ff66aa" stroke-width="1" opacity="0.8"/>
  <path d="M44 18 Q38 12 34 18" 
        fill="none" stroke="#ff66aa" stroke-width="1" opacity="0.6"/>
  <path d="M44 22 Q40 18 36 22" 
        fill="none" stroke="#ff66aa" stroke-width="1" opacity="0.6"/>
  
  <!-- Halo -->
  <ellipse cx="24" cy="8" rx="8" ry="3" 
           fill="none" stroke="#ffdd00" stroke-width="2" 
           filter="url(#cherubGlow)"/>
  
  <!-- Body (cherub head) -->
  <circle cx="24" cy="24" r="12" fill="url(#cherubGrad)" 
          stroke="#ff66aa" stroke-width="2" filter="url(#cherubGlow)"/>
  
  <!-- Rosy cheeks -->
  <circle cx="16" cy="26" r="3" fill="#ff8888" opacity="0.6"/>
  <circle cx="32" cy="26" r="3" fill="#ff8888" opacity="0.6"/>
  
  <!-- Eyes (cute but unsettling) -->
  <ellipse cx="20" cy="22" rx="3" ry="4" fill="#ffffff"/>
  <ellipse cx="28" cy="22" rx="3" ry="4" fill="#ffffff"/>
  <circle cx="20" cy="23" r="2" fill="#1a1a2e"/>
  <circle cx="28" cy="23" r="2" fill="#1a1a2e"/>
  <!-- Glint -->
  <circle cx="21" cy="21" r="1" fill="#ffffff"/>
  <circle cx="29" cy="21" r="1" fill="#ffffff"/>
  
  <!-- Cupid lips -->
  <path d="M22 30 Q24 32 26 30" stroke="#ff3366" stroke-width="1.5" fill="none"/>
  
  <!-- Motion trail (zigzag) -->
  <path d="M24 40 L20 44 L28 46 L24 48" stroke="#ff66aa" stroke-width="1" fill="none" opacity="0.5"/>
</svg>

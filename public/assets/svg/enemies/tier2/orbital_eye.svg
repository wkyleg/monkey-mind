<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Orbital Eye - Tier 2 (Pattern/Organic) -->
  <defs>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="70%" stop-color="#0088aa"/>
      <stop offset="100%" stop-color="#004466"/>
    </radialGradient>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Orbital rings -->
  <ellipse cx="24" cy="24" rx="22" ry="8" 
           fill="none" stroke="#00ffff" stroke-width="1" 
           opacity="0.4" transform="rotate(-30, 24, 24)"/>
  <ellipse cx="24" cy="24" rx="22" ry="8" 
           fill="none" stroke="#00ffff" stroke-width="1" 
           opacity="0.4" transform="rotate(30, 24, 24)"/>
  <ellipse cx="24" cy="24" rx="20" ry="6" 
           fill="none" stroke="#00ffff" stroke-width="1.5" 
           opacity="0.6" transform="rotate(0, 24, 24)"/>
  
  <!-- Satellite orbs on orbit -->
  <circle cx="4" cy="24" r="2" fill="#00ffff" filter="url(#eyeGlow)"/>
  <circle cx="44" cy="24" r="2" fill="#00ffff" filter="url(#eyeGlow)"/>
  <circle cx="12" cy="12" r="1.5" fill="#00ffff" filter="url(#eyeGlow)"/>
  <circle cx="36" cy="36" r="1.5" fill="#00ffff" filter="url(#eyeGlow)"/>
  
  <!-- Eye white (sclera) -->
  <ellipse cx="24" cy="24" rx="12" ry="14" 
           fill="#e8e8ff" stroke="#00ffff" stroke-width="2"
           filter="url(#eyeGlow)"/>
  
  <!-- Iris -->
  <circle cx="24" cy="24" r="8" fill="url(#eyeGrad)" filter="url(#eyeGlow)"/>
  
  <!-- Pupil (vertical slit) -->
  <ellipse cx="24" cy="24" rx="2" ry="6" fill="#000033"/>
  
  <!-- Reflections -->
  <circle cx="26" cy="20" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="22" cy="28" r="1" fill="#ffffff" opacity="0.5"/>
  
  <!-- Veins -->
  <path d="M12 22 Q16 23 18 24" stroke="#ff6666" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M12 26 Q15 25 18 24" stroke="#ff6666" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M36 22 Q32 23 30 24" stroke="#ff6666" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M36 26 Q33 25 30 24" stroke="#ff6666" stroke-width="0.5" fill="none" opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Machine Elf - Tier 5 (Transcendent) -->
  <defs>
    <radialGradient id="elfGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff88ff"/>
      <stop offset="100%" stop-color="#8800ff"/>
    </radialGradient>
    <filter id="elfGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fractal body - recursive triangles -->
  <polygon points="32,8 52,52 12,52" fill="url(#elfGrad)" stroke="#ff00ff" stroke-width="2" filter="url(#elfGlow)"/>
  <polygon points="32,20 42,44 22,44" fill="#220044" stroke="#ff88ff" stroke-width="1"/>
  <polygon points="32,28 36,38 28,38" fill="#ff00ff" stroke="#ffffff" stroke-width="0.5"/>
  
  <!-- Multiple eyes - arranged in spiral -->
  <circle cx="26" cy="32" r="4" fill="#00ffff"/>
  <circle cx="38" cy="32" r="4" fill="#00ffff"/>
  <circle cx="32" cy="40" r="3" fill="#00ffff"/>
  <circle cx="24" cy="42" r="2" fill="#00ffff" opacity="0.7"/>
  <circle cx="40" cy="42" r="2" fill="#00ffff" opacity="0.7"/>
  
  <!-- Eye pupils -->
  <circle cx="26" cy="32" r="2" fill="#000033"/>
  <circle cx="38" cy="32" r="2" fill="#000033"/>
  <circle cx="32" cy="40" r="1.5" fill="#000033"/>
  
  <!-- Crown of self-transforming objects -->
  <circle cx="32" cy="12" r="3" fill="#ffff00"/>
  <circle cx="24" cy="14" r="2" fill="#ff8800"/>
  <circle cx="40" cy="14" r="2" fill="#00ff00"/>
  <rect x="28" y="6" width="8" height="4" fill="#ff00ff" rx="1"/>
  
  <!-- Energy tendrils -->
  <path d="M12 52 Q 6 60 10 62" stroke="#ff88ff" stroke-width="1" fill="none" opacity="0.8"/>
  <path d="M52 52 Q 58 60 54 62" stroke="#ff88ff" stroke-width="1" fill="none" opacity="0.8"/>
</svg>

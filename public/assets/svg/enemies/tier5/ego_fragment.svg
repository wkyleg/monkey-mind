<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ego Fragment - Tier 5 (Transcendent) -->
  <defs>
    <radialGradient id="egoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </radialGradient>
    <filter id="egoGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="mirror">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  
  <!-- Shattered mirror shape -->
  <polygon points="32,4 48,20 52,40 40,56 24,56 12,40 16,20" 
           fill="url(#egoGrad)" stroke="#ffaa00" stroke-width="2" filter="url(#egoGlow)"/>
  
  <!-- Crack lines -->
  <line x1="32" y1="4" x2="32" y2="32" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
  <line x1="32" y1="32" x2="12" y2="40" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="32" x2="52" y2="40" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="32" x2="24" y2="56" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="32" x2="40" y2="56" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  
  <!-- Reflection of self - distorted face -->
  <ellipse cx="32" cy="28" rx="10" ry="12" fill="#331100" opacity="0.8"/>
  
  <!-- Eyes - one normal, one inverted -->
  <circle cx="27" cy="26" r="3" fill="#ffffff"/>
  <circle cx="37" cy="26" r="3" fill="#000000" stroke="#ffffff" stroke-width="1"/>
  <circle cx="27" cy="26" r="1.5" fill="#000000"/>
  <circle cx="37" cy="26" r="1.5" fill="#ffffff"/>
  
  <!-- Mouth - uncertain expression -->
  <path d="M26 34 Q 32 36 38 34" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.7"/>
  
  <!-- Fragment pieces floating away -->
  <polygon points="56,12 60,18 54,20" fill="#ffdd00" opacity="0.6"/>
  <polygon points="8,12 4,18 10,20" fill="#ff8800" opacity="0.6"/>
  <polygon points="56,48 62,52 58,56" fill="#ffaa00" opacity="0.5"/>
  <polygon points="8,48 2,52 6,56" fill="#ffcc00" opacity="0.5"/>
</svg>

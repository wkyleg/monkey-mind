<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Synapse Drone - Tier 1 (Neural/Clinical) -->
  <defs>
    <linearGradient id="droneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00aa66"/>
    </linearGradient>
    <filter id="droneGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Neural connections -->
  <line x1="24" y1="8" x2="24" y2="2" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  <line x1="12" y1="16" x2="6" y2="12" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  <line x1="36" y1="16" x2="42" y2="12" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Main body (hexagonal) -->
  <polygon points="24,6 38,14 38,30 24,38 10,30 10,14" 
           fill="#1a2a3a" 
           stroke="url(#droneGrad)" 
           stroke-width="2"
           filter="url(#droneGlow)"/>
  
  <!-- Inner circuit pattern -->
  <polygon points="24,12 32,16 32,28 24,32 16,28 16,16" 
           fill="none" 
           stroke="#00ff88" 
           stroke-width="1"
           opacity="0.5"/>
  
  <!-- Central eye -->
  <circle cx="24" cy="22" r="8" fill="#0a1a2a" stroke="#00ff88" stroke-width="1.5" filter="url(#droneGlow)"/>
  <circle cx="24" cy="22" r="5" fill="#00ff88" filter="url(#droneGlow)"/>
  <circle cx="24" cy="22" r="2" fill="#ffffff"/>
  
  <!-- Synapse nodes -->
  <circle cx="24" cy="8" r="3" fill="#00ff88" filter="url(#droneGlow)"/>
  <circle cx="10" cy="14" r="2" fill="#00ff88" filter="url(#droneGlow)"/>
  <circle cx="38" cy="14" r="2" fill="#00ff88" filter="url(#droneGlow)"/>
  <circle cx="10" cy="30" r="2" fill="#00ff88" filter="url(#droneGlow)"/>
  <circle cx="38" cy="30" r="2" fill="#00ff88" filter="url(#droneGlow)"/>
  
  <!-- Data pulse indicators -->
  <circle cx="18" cy="14" r="1.5" fill="#00ffaa" opacity="0.8"/>
  <circle cx="30" cy="14" r="1.5" fill="#00ffaa" opacity="0.8"/>
</svg>

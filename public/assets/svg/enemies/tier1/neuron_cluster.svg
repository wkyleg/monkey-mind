<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Neuron Cluster - Tier 1 (Neural/Clinical) -->
  <defs>
    <radialGradient id="neuronGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </radialGradient>
    <filter id="neuronGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dendrite connections (branching) -->
  <path d="M24 6 L24 0" stroke="#00ccff" stroke-width="1.5" opacity="0.6"/>
  <path d="M24 6 L18 2" stroke="#00ccff" stroke-width="1" opacity="0.5"/>
  <path d="M24 6 L30 2" stroke="#00ccff" stroke-width="1" opacity="0.5"/>
  
  <path d="M8 20 L2 18" stroke="#00ccff" stroke-width="1.5" opacity="0.6"/>
  <path d="M8 20 L2 24" stroke="#00ccff" stroke-width="1" opacity="0.5"/>
  
  <path d="M40 20 L46 18" stroke="#00ccff" stroke-width="1.5" opacity="0.6"/>
  <path d="M40 20 L46 24" stroke="#00ccff" stroke-width="1" opacity="0.5"/>
  
  <!-- Axon -->
  <path d="M24 38 L24 46" stroke="#00ccff" stroke-width="2" opacity="0.8"/>
  
  <!-- Main cell body (soma) -->
  <circle cx="24" cy="22" r="14" fill="#0a1520" stroke="#00ccff" stroke-width="2" filter="url(#neuronGlow)"/>
  
  <!-- Internal structure -->
  <circle cx="24" cy="22" r="10" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.4"/>
  <circle cx="24" cy="22" r="6" fill="url(#neuronGrad)" filter="url(#neuronGlow)"/>
  
  <!-- Nucleus -->
  <circle cx="24" cy="22" r="3" fill="#ffffff" opacity="0.8"/>
  
  <!-- Satellite nodes -->
  <circle cx="24" cy="6" r="3" fill="#00ccff" filter="url(#neuronGlow)"/>
  <circle cx="8" cy="20" r="3" fill="#00ccff" filter="url(#neuronGlow)"/>
  <circle cx="40" cy="20" r="3" fill="#00ccff" filter="url(#neuronGlow)"/>
  <circle cx="14" cy="34" r="2" fill="#00ccff" filter="url(#neuronGlow)"/>
  <circle cx="34" cy="34" r="2" fill="#00ccff" filter="url(#neuronGlow)"/>
  
  <!-- Electrical pulses -->
  <circle cx="24" cy="14" r="1" fill="#ffffff"/>
  <circle cx="16" cy="24" r="1" fill="#ffffff"/>
  <circle cx="32" cy="24" r="1" fill="#ffffff"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tentacled Halo - Tier 4 (Aberrations/DMT) -->
  <defs>
    <linearGradient id="tentacleGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="50%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ffff00"/>
    </linearGradient>
    <linearGradient id="tentacleGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff00"/>
      <stop offset="50%" stop-color="#ff0066"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="dmtGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Reality distortion background -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#tentacleGrad1)" stroke-width="1" opacity="0.3"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#tentacleGrad2)" stroke-width="1" opacity="0.4"/>
  
  <!-- Tentacles (impossible curves) -->
  <path d="M32 6 Q20 0 10 10 Q0 20 6 32" 
        stroke="url(#tentacleGrad1)" stroke-width="3" fill="none" filter="url(#dmtGlow)"/>
  <path d="M32 6 Q44 0 54 10 Q64 20 58 32" 
        stroke="url(#tentacleGrad2)" stroke-width="3" fill="none" filter="url(#dmtGlow)"/>
  <path d="M6 32 Q0 44 10 54 Q20 64 32 58" 
        stroke="url(#tentacleGrad1)" stroke-width="3" fill="none" filter="url(#dmtGlow)"/>
  <path d="M58 32 Q64 44 54 54 Q44 64 32 58" 
        stroke="url(#tentacleGrad2)" stroke-width="3" fill="none" filter="url(#dmtGlow)"/>
  
  <!-- Extra writhing tentacles -->
  <path d="M18 18 Q10 24 14 32 Q10 40 18 46" 
        stroke="#ff66ff" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M46 18 Q54 24 50 32 Q54 40 46 46" 
        stroke="#66ffff" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Central halo (geometric, sacred) -->
  <circle cx="32" cy="32" r="12" fill="#1a0a1a" stroke="#ffff00" stroke-width="2" filter="url(#dmtGlow)"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.7"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  
  <!-- Eye at center -->
  <circle cx="32" cy="32" r="5" fill="#ffffff"/>
  <circle cx="32" cy="32" r="3" fill="url(#tentacleGrad1)"/>
  <circle cx="32" cy="32" r="1.5" fill="#000000"/>
  
  <!-- Iridescent shimmer spots -->
  <circle cx="20" cy="20" r="2" fill="#ff00ff" filter="url(#dmtGlow)" opacity="0.8"/>
  <circle cx="44" cy="20" r="2" fill="#00ffff" filter="url(#dmtGlow)" opacity="0.8"/>
  <circle cx="20" cy="44" r="2" fill="#ffff00" filter="url(#dmtGlow)" opacity="0.8"/>
  <circle cx="44" cy="44" r="2" fill="#00ff00" filter="url(#dmtGlow)" opacity="0.8"/>
</svg>

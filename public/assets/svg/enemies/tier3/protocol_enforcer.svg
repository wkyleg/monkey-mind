<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <!-- Protocol Enforcer - Tier 3 (Ideological/Digital Authority) -->
  <defs>
    <linearGradient id="enforcerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#445566"/>
      <stop offset="100%" stop-color="#223344"/>
    </linearGradient>
    <filter id="enforcerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Authority rings (hierarchical protocols) -->
  <ellipse cx="28" cy="6" rx="10" ry="3" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#enforcerGlow)"/>
  <ellipse cx="28" cy="10" rx="8" ry="2" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="28" cy="13" rx="6" ry="1.5" fill="none" stroke="#ff8800" stroke-width="1" opacity="0.6"/>
  
  <!-- Data transmission wings -->
  <path d="M4 24 Q12 16 16 24 Q12 32 4 28 Z" 
        fill="url(#enforcerGrad)" stroke="#00aaff" stroke-width="1"/>
  <path d="M6 22 Q10 18 14 22" fill="none" stroke="#00ffff" stroke-width="1"/>
  <path d="M6 26 Q10 24 14 26" fill="none" stroke="#00ffff" stroke-width="1"/>
  
  <path d="M52 24 Q44 16 40 24 Q44 32 52 28 Z" 
        fill="url(#enforcerGrad)" stroke="#00aaff" stroke-width="1"/>
  <path d="M50 22 Q46 18 42 22" fill="none" stroke="#00ffff" stroke-width="1"/>
  <path d="M50 26 Q46 24 42 26" fill="none" stroke="#00ffff" stroke-width="1"/>
  
  <!-- Head (monitor-like) -->
  <rect x="18" y="16" width="20" height="18" rx="2" fill="#111122" stroke="#334455" stroke-width="1"/>
  <!-- Screen face -->
  <rect x="20" y="18" width="16" height="14" fill="#0a0a1a"/>
  
  <!-- Digital eyes -->
  <rect x="22" y="22" width="4" height="3" fill="#ff3300"/>
  <rect x="30" y="22" width="4" height="3" fill="#ff3300"/>
  
  <!-- Stern digital mouth -->
  <rect x="24" y="28" width="8" height="2" fill="#ff6600"/>
  
  <!-- Clipboard/Form body -->
  <rect x="18" y="36" width="20" height="16" fill="#1a1a2e" stroke="#334455" stroke-width="1"/>
  <!-- Data lines on form -->
  <line x1="20" y1="40" x2="36" y2="40" stroke="#00ff00" stroke-width="0.5"/>
  <line x1="20" y1="44" x2="36" y2="44" stroke="#00ff00" stroke-width="0.5"/>
  <line x1="20" y1="48" x2="36" y2="48" stroke="#00ff00" stroke-width="0.5"/>
  
  <!-- Access denied stamp -->
  <text x="28" y="50" font-size="5" fill="#ff0000" text-anchor="middle" transform="rotate(-15, 28, 48)" font-family="monospace">DENIED</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 56" width="48" height="56">
  <!-- Animal Philosopher (Lion-headed Thinker) - Tier 3 (Ideological/Renaissance) -->
  <defs>
    <radialGradient id="maneGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#996600"/>
    </radialGradient>
    <filter id="philosopherGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Wisdom rays -->
  <line x1="24" y1="2" x2="24" y2="8" stroke="#ffdd00" stroke-width="1" opacity="0.6"/>
  <line x1="10" y1="8" x2="14" y2="12" stroke="#ffdd00" stroke-width="1" opacity="0.6"/>
  <line x1="38" y1="8" x2="34" y2="12" stroke="#ffdd00" stroke-width="1" opacity="0.6"/>
  
  <!-- Mane -->
  <ellipse cx="24" cy="20" rx="18" ry="16" fill="url(#maneGrad)" filter="url(#philosopherGlow)"/>
  
  <!-- Mane texture (rays) -->
  <path d="M8 14 Q12 18 8 22" stroke="#aa7700" stroke-width="1" fill="none"/>
  <path d="M10 10 Q14 16 10 20" stroke="#aa7700" stroke-width="1" fill="none"/>
  <path d="M40 14 Q36 18 40 22" stroke="#aa7700" stroke-width="1" fill="none"/>
  <path d="M38 10 Q34 16 38 20" stroke="#aa7700" stroke-width="1" fill="none"/>
  
  <!-- Face -->
  <ellipse cx="24" cy="22" rx="10" ry="10" fill="#d4a574"/>
  
  <!-- Wise eyes -->
  <ellipse cx="20" cy="20" rx="3" ry="2" fill="#ffffff"/>
  <ellipse cx="28" cy="20" rx="3" ry="2" fill="#ffffff"/>
  <circle cx="20" cy="20" r="1.5" fill="#443300"/>
  <circle cx="28" cy="20" r="1.5" fill="#443300"/>
  
  <!-- Noble nose -->
  <path d="M22 24 L24 28 L26 24" fill="#aa7755" stroke="none"/>
  
  <!-- Dignified mouth -->
  <path d="M20 30 Q24 32 28 30" stroke="#553322" stroke-width="1" fill="none"/>
  
  <!-- Philosopher's robe -->
  <path d="M10 34 L6 56 L42 56 L38 34 Q24 40 10 34 Z" 
        fill="#2244aa" stroke="#334488" stroke-width="1"/>
  
  <!-- Greek key pattern on robe -->
  <path d="M12 50 L16 50 L16 48 L20 48 L20 50 L24 50 L24 48 L28 48 L28 50 L32 50 L32 48 L36 48" 
        stroke="#ffdd00" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Thought bubble -->
  <circle cx="42" cy="12" r="4" fill="#ffffff" stroke="#aaaaaa" stroke-width="0.5" opacity="0.8"/>
  <circle cx="38" cy="18" r="2" fill="#ffffff" stroke="#aaaaaa" stroke-width="0.5" opacity="0.6"/>
  <circle cx="36" cy="22" r="1" fill="#ffffff" opacity="0.4"/>
  <text x="42" y="14" font-size="5" fill="#333333" text-anchor="middle">∞</text>
</svg>

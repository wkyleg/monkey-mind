<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 56" width="48" height="56">
  <!-- Logic Cultist - Tier 3 (Ideological/Renaissance) -->
  <defs>
    <linearGradient id="cultistGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8844aa"/>
      <stop offset="100%" stop-color="#442266"/>
    </linearGradient>
    <filter id="cultistGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Halo (geometric, mathematical) -->
  <circle cx="24" cy="10" r="8" fill="none" stroke="#ffdd00" stroke-width="2" filter="url(#cultistGlow)"/>
  <!-- Inner geometric pattern -->
  <polygon points="24,4 28,8 28,12 24,16 20,12 20,8" 
           fill="none" stroke="#ffdd00" stroke-width="1" opacity="0.6"/>
  
  <!-- Hood -->
  <path d="M8 18 Q24 4 40 18 L40 32 Q24 40 8 32 Z" 
        fill="url(#cultistGrad)" 
        stroke="#aa66cc" 
        stroke-width="2"/>
  
  <!-- Shadow inside hood -->
  <path d="M14 20 Q24 14 34 20 L34 28 Q24 34 14 28 Z" 
        fill="#1a0a1a" opacity="0.8"/>
  
  <!-- Glowing eyes in shadow -->
  <circle cx="20" cy="24" r="2" fill="#ffdd00" filter="url(#cultistGlow)"/>
  <circle cx="28" cy="24" r="2" fill="#ffdd00" filter="url(#cultistGlow)"/>
  
  <!-- Robe body -->
  <path d="M8 32 L4 56 L44 56 L40 32 Q24 40 8 32 Z" 
        fill="url(#cultistGrad)" 
        stroke="#aa66cc" 
        stroke-width="1"/>
  
  <!-- Logic symbols on robe -->
  <text x="18" y="48" font-size="8" fill="#ffdd00" opacity="0.7">∀</text>
  <text x="26" y="48" font-size="8" fill="#ffdd00" opacity="0.7">∃</text>
  
  <!-- Hands holding logic scroll -->
  <ellipse cx="18" cy="42" rx="3" ry="2" fill="#d4a574"/>
  <ellipse cx="30" cy="42" rx="3" ry="2" fill="#d4a574"/>
  <rect x="16" y="40" width="16" height="4" fill="#f5f5dc" stroke="#aa9988" stroke-width="0.5"/>
  <text x="24" y="43" font-size="4" fill="#333333" text-anchor="middle">∴ Q.E.D.</text>
</svg>

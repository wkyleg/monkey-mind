<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <!-- Angelic Bureaucrat - Tier 3 (Ideological/Renaissance) -->
  <defs>
    <linearGradient id="bureaucratGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ccccee"/>
    </linearGradient>
    <filter id="bureaucratGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Multiple halos (bureaucratic hierarchy) -->
  <ellipse cx="28" cy="6" rx="10" ry="3" fill="none" stroke="#ffdd00" stroke-width="2" filter="url(#bureaucratGlow)"/>
  <ellipse cx="28" cy="10" rx="8" ry="2" fill="none" stroke="#ffdd00" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="28" cy="13" rx="6" ry="1.5" fill="none" stroke="#ffdd00" stroke-width="1" opacity="0.6"/>
  
  <!-- Wings (feathered, official looking) -->
  <path d="M4 24 Q12 16 16 24 Q12 32 4 28 Z" 
        fill="url(#bureaucratGrad)" stroke="#aaaacc" stroke-width="1"/>
  <path d="M6 22 Q10 18 14 22" fill="none" stroke="#ddddee" stroke-width="1"/>
  <path d="M6 26 Q10 24 14 26" fill="none" stroke="#ddddee" stroke-width="1"/>
  
  <path d="M52 24 Q44 16 40 24 Q44 32 52 28 Z" 
        fill="url(#bureaucratGrad)" stroke="#aaaacc" stroke-width="1"/>
  <path d="M50 22 Q46 18 42 22" fill="none" stroke="#ddddee" stroke-width="1"/>
  <path d="M50 26 Q46 24 42 26" fill="none" stroke="#ddddee" stroke-width="1"/>
  
  <!-- Head -->
  <circle cx="28" cy="24" r="8" fill="#e8d4c4" stroke="#ccbbaa" stroke-width="1"/>
  
  <!-- Stern expression -->
  <circle cx="25" cy="22" r="1.5" fill="#333333"/>
  <circle cx="31" cy="22" r="1.5" fill="#333333"/>
  <path d="M25 28 L31 28" stroke="#333333" stroke-width="1.5"/>
  <!-- Frown lines -->
  <path d="M23 20 L25 21" stroke="#aa9988" stroke-width="0.5"/>
  <path d="M33 20 L31 21" stroke="#aa9988" stroke-width="0.5"/>
  
  <!-- Clipboard/Form body -->
  <rect x="18" y="34" width="20" height="18" fill="#f8f8e8" stroke="#888888" stroke-width="1"/>
  <!-- Lines on form -->
  <line x1="20" y1="38" x2="36" y2="38" stroke="#cccccc" stroke-width="0.5"/>
  <line x1="20" y1="42" x2="36" y2="42" stroke="#cccccc" stroke-width="0.5"/>
  <line x1="20" y1="46" x2="36" y2="46" stroke="#cccccc" stroke-width="0.5"/>
  
  <!-- Stamp of approval/denial -->
  <text x="28" y="50" font-size="6" fill="#ff0000" text-anchor="middle" transform="rotate(-15, 28, 48)">DENIED</text>
</svg>

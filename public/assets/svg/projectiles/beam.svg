<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 48" width="16" height="48">
  <!-- Calm Beam Projectile -->
  <defs>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="beamGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow -->
  <rect x="4" y="0" width="8" height="48" fill="#00aaff" opacity="0.3" filter="url(#beamGlow)"/>
  
  <!-- Main beam -->
  <rect x="5" y="0" width="6" height="48" fill="url(#beamGrad)" filter="url(#beamGlow)"/>
  
  <!-- Core (brightest) -->
  <rect x="7" y="0" width="2" height="48" fill="#ffffff"/>
  
  <!-- Energy particles -->
  <circle cx="8" cy="8" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="8" cy="24" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="8" cy="40" r="1.5" fill="#ffffff" opacity="0.8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Shadow Monkey - Dark doppelganger -->
  <defs>
    <radialGradient id="shadowMonkeyGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2a1a2a"/>
      <stop offset="100%" stop-color="#0a0510" stop-opacity="0.8"/>
    </radialGradient>
  </defs>
  
  <g transform="translate(30,35)">
    <!-- Shadow body -->
    <ellipse cx="0" cy="5" rx="14" ry="18" fill="url(#shadowMonkeyGrad)"/>
    
    <!-- Wispy edges -->
    <g fill="#1a0a1a" opacity="0.6">
      <path d="M-14,0 Q-20,-5 -18,10 Q-22,20 -15,18"/>
      <path d="M14,0 Q20,-5 18,10 Q22,20 15,18"/>
      <path d="M0,23 Q5,30 0,35 Q-5,30 0,23"/>
    </g>
    
    <!-- Head -->
    <circle cx="0" cy="-15" r="12" fill="#1a0a1a"/>
    
    <!-- Ears -->
    <circle cx="-12" cy="-20" r="5" fill="#150510"/>
    <circle cx="12" cy="-20" r="5" fill="#150510"/>
    
    <!-- Glowing eyes (sinister) -->
    <circle cx="-5" cy="-16" r="4" fill="#ff00ff"/>
    <circle cx="5" cy="-16" r="4" fill="#ff00ff"/>
    <circle cx="-4" cy="-17" r="1.5" fill="#ffffff"/>
    <circle cx="6" cy="-17" r="1.5" fill="#ffffff"/>
    
    <!-- Sinister grin -->
    <path d="M-6,-8 Q0,-4 6,-8" stroke="#ff00ff" stroke-width="2" fill="none"/>
    
    <!-- Shadow particles -->
    <g fill="#4a1a4a" opacity="0.4">
      <circle cx="-18" cy="5" r="3"/>
      <circle cx="18" cy="-5" r="2"/>
      <circle cx="-15" cy="20" r="2"/>
      <circle cx="15" cy="18" r="3"/>
    </g>
  </g>
</svg>

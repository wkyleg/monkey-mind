<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Siren - Mythological temptress -->
  <defs>
    <linearGradient id="sirenTail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a8a8a"/>
      <stop offset="100%" stop-color="#0a4a4a"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(30,35)">
    <!-- Fish tail -->
    <path d="M0,5 Q-5,15 -10,25 Q-5,30 0,25 Q5,30 10,25 Q5,15 0,5" fill="url(#sirenTail)"/>
    <path d="M-10,25 Q-20,30 -25,25 Q-20,20 -10,25" fill="#0a6a6a"/>
    <path d="M10,25 Q20,30 25,25 Q20,20 10,25" fill="#0a6a6a"/>
    
    <!-- Scale pattern -->
    <g fill="#4aaa9a" opacity="0.5">
      <ellipse cx="-3" cy="10" rx="3" ry="2"/>
      <ellipse cx="3" cy="12" rx="3" ry="2"/>
      <ellipse cx="-2" cy="18" rx="3" ry="2"/>
      <ellipse cx="4" cy="20" rx="3" ry="2"/>
    </g>
    
    <!-- Torso -->
    <ellipse cx="0" cy="-5" rx="10" ry="12" fill="#e8d4b8"/>
    
    <!-- Hair (flowing) -->
    <g fill="#1a3a3a">
      <ellipse cx="-12" cy="-15" rx="6" ry="20" transform="rotate(-15,-12,-15)"/>
      <ellipse cx="12" cy="-15" rx="6" ry="20" transform="rotate(15,12,-15)"/>
      <ellipse cx="0" cy="-20" rx="12" ry="8"/>
    </g>
    
    <!-- Face -->
    <ellipse cx="0" cy="-15" rx="8" ry="9" fill="#e8d4b8"/>
    
    <!-- Eyes (hypnotic) -->
    <circle cx="-3" cy="-16" r="2.5" fill="#00ffaa"/>
    <circle cx="3" cy="-16" r="2.5" fill="#00ffaa"/>
    <circle cx="-3" cy="-16" r="1" fill="#000000"/>
    <circle cx="3" cy="-16" r="1" fill="#000000"/>
    
    <!-- Lips -->
    <ellipse cx="0" cy="-10" rx="3" ry="1.5" fill="#cc5555"/>
    
    <!-- Sound waves (singing) -->
    <g stroke="#00ffaa" stroke-width="1" fill="none" opacity="0.4">
      <path d="M-20,-10 Q-25,-15 -20,-20"/>
      <path d="M-25,-10 Q-30,-15 -25,-20"/>
      <path d="M20,-10 Q25,-15 20,-20"/>
      <path d="M25,-10 Q30,-15 25,-20"/>
    </g>
  </g>
</svg>

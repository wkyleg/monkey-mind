<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Sunken Atlantis ruins -->
  <defs>
    <linearGradient id="underwaterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4080"/>
      <stop offset="100%" style="stop-color:#021830"/>
    </linearGradient>
    <filter id="underwaterBlur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  
  <rect width="400" height="600" fill="url(#underwaterGrad)"/>
  
  <!-- Ruined columns -->
  <g filter="url(#underwaterBlur)" opacity="0.4">
    <rect x="50" y="200" width="25" height="250" fill="#6a8a9a"/>
    <rect x="85" y="180" width="25" height="270" fill="#5a7a8a"/>
    <rect x="290" y="200" width="25" height="250" fill="#6a8a9a"/>
    <rect x="325" y="160" width="25" height="290" fill="#5a7a8a"/>
    
    <!-- Broken column pieces -->
    <ellipse cx="150" cy="520" rx="20" ry="10" fill="#4a6a7a"/>
    <ellipse cx="250" cy="540" rx="25" ry="12" fill="#4a6a7a"/>
  </g>
  
  <!-- Concentric circles (Atlantean symbol) -->
  <g stroke="#4a9acc" stroke-width="2" fill="none" opacity="0.3">
    <circle cx="200" cy="300" r="50"/>
    <circle cx="200" cy="300" r="80"/>
    <circle cx="200" cy="300" r="110"/>
    <line x1="200" y1="190" x2="200" y2="410"/>
    <line x1="90" y1="300" x2="310" y2="300"/>
  </g>
  
  <!-- Floating particles (bubbles/plankton) -->
  <g fill="#8ac" opacity="0.4">
    <circle cx="80" cy="150" r="2">
      <animate attributeName="cy" values="150;100;150" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="250" r="3">
      <animate attributeName="cy" values="250;180;250" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="400" r="2">
      <animate attributeName="cy" values="400;340;400" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

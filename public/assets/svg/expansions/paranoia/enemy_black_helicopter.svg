<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 50">
  <!-- Black Helicopter - Fast moving swarm -->
  <g transform="translate(35,25)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#1a1a1a"/>
    
    <!-- Cockpit -->
    <ellipse cx="-12" cy="-2" rx="8" ry="5" fill="#2a2a3a"/>
    <!-- Cockpit glass -->
    <ellipse cx="-14" cy="-3" rx="5" ry="3" fill="#3a3a4a" opacity="0.6"/>
    
    <!-- Tail boom -->
    <rect x="10" y="-2" width="20" height="4" fill="#1a1a1a"/>
    
    <!-- Tail rotor housing -->
    <rect x="28" y="-5" width="4" height="10" fill="#2a2a2a"/>
    
    <!-- Main rotor (blurred) -->
    <ellipse cx="0" cy="-8" rx="30" ry="3" fill="#3a3a3a" opacity="0.4"/>
    <line x1="-28" y1="-8" x2="28" y2="-8" stroke="#4a4a4a" stroke-width="2"/>
    
    <!-- Tail rotor -->
    <line x1="30" y1="-8" x2="30" y2="8" stroke="#3a3a3a" stroke-width="2"/>
    
    <!-- Skids -->
    <g stroke="#2a2a2a" stroke-width="2" fill="none">
      <path d="M-10,8 L-10,12 L-15,12"/>
      <path d="M10,8 L10,12 L15,12"/>
    </g>
    
    <!-- Searchlight -->
    <g opacity="0.5">
      <circle cx="-15" cy="5" r="3" fill="#ffff00"/>
      <path d="M-15,8 L-25,25 L-5,25 Z" fill="#ffff00" opacity="0.2"/>
    </g>
    
    <!-- No markings (unmarked) -->
    <!-- Antenna -->
    <line x1="5" y1="-5" x2="5" y2="-12" stroke="#3a3a3a" stroke-width="1"/>
  </g>
</svg>

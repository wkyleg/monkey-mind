<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Mysterious agent -->
  <g transform="translate(30,30)">
    <!-- Body (suit) -->
    <rect x="-10" y="-5" width="20" height="25" fill="#1a1a1a"/>
    
    <!-- Tie -->
    <polygon points="0,-5 -3,5 0,15 3,5" fill="#2a2a2a"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="-12" rx="8" ry="10" fill="#d4b896"/>
    
    <!-- Hat -->
    <rect x="-12" y="-22" width="24" height="5" fill="#0a0a0a"/>
    <ellipse cx="0" cy="-22" rx="10" ry="4" fill="#1a1a1a"/>
    
    <!-- Sunglasses (always) -->
    <rect x="-8" y="-15" width="6" height="4" fill="#0a0a0a" rx="1"/>
    <rect x="2" y="-15" width="6" height="4" fill="#0a0a0a" rx="1"/>
    <line x1="-2" y1="-13" x2="2" y2="-13" stroke="#0a0a0a" stroke-width="1"/>
    
    <!-- Earpiece -->
    <line x1="8" y1="-14" x2="12" y2="-10" stroke="#444" stroke-width="2"/>
    <circle cx="12" cy="-8" r="2" fill="#444"/>
    
    <!-- Static/interference -->
    <g stroke="#00ff00" stroke-width="0.5" opacity="0.5">
      <line x1="-15" y1="-25" x2="-10" y2="-25">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="0.2s" repeatCount="indefinite"/>
      </line>
      <line x1="10" y1="15" x2="15" y2="15">
        <animate attributeName="opacity" values="0;0.5;0" dur="0.3s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>
</svg>

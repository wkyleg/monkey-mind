<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Surveillance drone -->
  <g transform="translate(30,30)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="12" ry="6" fill="#2a2a2a"/>
    
    <!-- Rotors -->
    <g fill="#444">
      <ellipse cx="-15" cy="0" rx="8" ry="2">
        <animateTransform attributeName="transform" type="rotate" from="0 -15 0" to="360 -15 0" dur="0.1s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="15" cy="0" rx="8" ry="2">
        <animateTransform attributeName="transform" type="rotate" from="0 15 0" to="360 15 0" dur="0.1s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="-12" rx="6" ry="2">
        <animateTransform attributeName="transform" type="rotate" from="0 0 -12" to="360 0 -12" dur="0.1s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="12" rx="6" ry="2">
        <animateTransform attributeName="transform" type="rotate" from="0 0 12" to="360 0 12" dur="0.1s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    
    <!-- Camera lens -->
    <circle cx="0" cy="4" r="5" fill="#1a1a1a"/>
    <circle cx="0" cy="4" r="3" fill="#ff0000">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Antenna -->
    <line x1="0" y1="-6" x2="0" y2="-15" stroke="#444" stroke-width="1"/>
    <circle cx="0" cy="-16" r="2" fill="#00ff00">
      <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- LED indicators -->
    <circle cx="-8" cy="-3" r="1" fill="#00ff00"/>
    <circle cx="8" cy="-3" r="1" fill="#ff0000"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Ancient temple in exotic location -->
  <defs>
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="30%" style="stop-color:#ff4a6a"/>
      <stop offset="70%" style="stop-color:#4a2a6a"/>
      <stop offset="100%" style="stop-color:#1a0a2a"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="600" fill="url(#sunsetGrad)"/>
  
  <!-- Sun -->
  <circle cx="200" cy="150" r="60" fill="#ffa500" opacity="0.8"/>
  <circle cx="200" cy="150" r="40" fill="#ffcc00"/>
  
  <!-- Temple silhouette -->
  <g fill="#1a0a1a">
    <!-- Main structure -->
    <polygon points="100,400 100,250 150,200 200,180 250,200 300,250 300,400"/>
    
    <!-- Spires -->
    <polygon points="150,250 150,150 170,120 190,150 190,250"/>
    <polygon points="210,250 210,150 230,120 250,150 250,250"/>
    
    <!-- Steps -->
    <rect x="150" y="400" width="100" height="20"/>
    <rect x="140" y="420" width="120" height="20"/>
    <rect x="130" y="440" width="140" height="20"/>
  </g>
  
  <!-- Decorative elements -->
  <g fill="#2a1a3a" opacity="0.8">
    <circle cx="170" cy="230" r="10"/>
    <circle cx="230" cy="230" r="10"/>
    <rect x="185" y="260" width="30" height="50"/>
  </g>
  
  <!-- Birds/bats -->
  <g fill="#1a0a1a">
    <path d="M50,200 Q55,195 60,200 Q65,195 70,200"/>
    <path d="M100,180 Q105,175 110,180 Q115,175 120,180"/>
    <path d="M300,220 Q305,215 310,220 Q315,215 320,220"/>
  </g>
  
  <!-- Ground vegetation -->
  <rect x="0" y="480" width="400" height="120" fill="#0a1a0a"/>
</svg>

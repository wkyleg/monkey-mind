<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Time Phantom - Temporal traveler (phaser) -->
  <defs>
    <linearGradient id="timeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#88ccff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4488aa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#224466" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(30,35)">
    <!-- Multiple temporal echoes -->
    <g opacity="0.2">
      <ellipse cx="-10" cy="5" rx="12" ry="20" fill="#88ccff"/>
      <circle cx="-10" cy="-15" r="10" fill="#88ccff"/>
    </g>
    <g opacity="0.4">
      <ellipse cx="-5" cy="5" rx="12" ry="20" fill="#88ccff"/>
      <circle cx="-5" cy="-15" r="10" fill="#88ccff"/>
    </g>
    
    <!-- Main body -->
    <ellipse cx="0" cy="5" rx="12" ry="20" fill="url(#timeGrad)"/>
    
    <!-- Head -->
    <circle cx="0" cy="-15" r="10" fill="#88ccff" opacity="0.8"/>
    
    <!-- Clock face on chest -->
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.6"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#224466" stroke-width="1"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-5" stroke="#224466" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="4" y2="2" stroke="#224466" stroke-width="1"/>
    <circle cx="0" cy="0" r="1" fill="#224466"/>
    
    <!-- Eyes (temporal) -->
    <circle cx="-4" cy="-16" r="3" fill="#ffffff"/>
    <circle cx="4" cy="-16" r="3" fill="#ffffff"/>
    <circle cx="-4" cy="-16" r="1.5" fill="#0066aa"/>
    <circle cx="4" cy="-16" r="1.5" fill="#0066aa"/>
    
    <!-- Hourglass symbol -->
    <g transform="translate(0,-30) scale(0.5)">
      <polygon points="0,-10 8,0 0,10 -8,0" fill="#ffd700" opacity="0.6"/>
    </g>
    
    <!-- Time distortion waves -->
    <g stroke="#88ccff" stroke-width="1" fill="none" opacity="0.4">
      <ellipse cx="0" cy="5" rx="18" ry="25"/>
      <ellipse cx="0" cy="5" rx="22" ry="30"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Desert Djinn - Middle Eastern spirit -->
  <defs>
    <linearGradient id="djinnSmoke" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4a2a6a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8a4aaa"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(30,35)">
    <!-- Smoke tail -->
    <path d="M0,25 Q-10,15 5,5 Q-5,-5 0,-15" stroke="url(#djinnSmoke)" stroke-width="15" fill="none" stroke-linecap="round"/>
    
    <!-- Torso -->
    <ellipse cx="0" cy="-10" rx="12" ry="15" fill="#8a4aaa" opacity="0.8"/>
    
    <!-- Arms crossed -->
    <g fill="#9a5aba" opacity="0.9">
      <path d="M-12,-15 Q-22,-10 -25,-18 Q-22,-22 -15,-18"/>
      <path d="M12,-15 Q22,-10 25,-18 Q22,-22 15,-18"/>
    </g>
    
    <!-- Head -->
    <circle cx="0" cy="-28" r="10" fill="#9a5aba"/>
    
    <!-- Turban -->
    <g fill="#ffd700">
      <ellipse cx="0" cy="-35" rx="12" ry="6"/>
      <circle cx="0" cy="-38" r="5" fill="#ff6600"/>
      <!-- Gem -->
      <circle cx="0" cy="-38" r="3" fill="#ff0000"/>
    </g>
    
    <!-- Eyes (mystical) -->
    <circle cx="-4" cy="-30" r="3" fill="#000000"/>
    <circle cx="4" cy="-30" r="3" fill="#000000"/>
    <circle cx="-4" cy="-30" r="2" fill="#ffff00"/>
    <circle cx="4" cy="-30" r="2" fill="#ffff00"/>
    
    <!-- Beard -->
    <path d="M-6,-22 Q0,-18 6,-22 Q4,-12 0,-10 Q-4,-12 -6,-22" fill="#4a2a6a"/>
    
    <!-- Mystical symbols floating -->
    <g fill="#ffd700" opacity="0.5" font-size="8">
      <text x="-20" y="-15">☽</text>
      <text x="15" y="-20">★</text>
    </g>
    
    <!-- Smoke wisps -->
    <g fill="#6a3a8a" opacity="0.4">
      <circle cx="-8" cy="15" r="4"/>
      <circle cx="8" cy="20" r="3"/>
      <circle cx="0" cy="30" r="5"/>
    </g>
  </g>
</svg>

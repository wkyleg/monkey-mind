<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Compass Wisp - Small navigation spirit (swarm) -->
  <g transform="translate(25,25)">
    <!-- Compass body -->
    <circle cx="0" cy="0" r="15" fill="#c9a227"/>
    <circle cx="0" cy="0" r="13" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="11" fill="#f5f5dc"/>
    
    <!-- Compass markings -->
    <g fill="#1a1a1a" font-size="4">
      <text x="0" y="-7" text-anchor="middle">N</text>
      <text x="0" y="10" text-anchor="middle">S</text>
      <text x="-8" y="2" text-anchor="middle">W</text>
      <text x="8" y="2" text-anchor="middle">E</text>
    </g>
    
    <!-- Compass needle -->
    <g>
      <polygon points="0,-8 2,0 0,8 -2,0" fill="#ff0000"/>
      <polygon points="0,8 2,0 0,-8 -2,0" fill="#ffffff" opacity="0.5"/>
    </g>
    
    <!-- Center pivot -->
    <circle cx="0" cy="0" r="2" fill="#c9a227"/>
    
    <!-- Ghostly glow -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#88ffff" stroke-width="1" opacity="0.4"/>
    
    <!-- Wisp trail -->
    <g fill="#88ffff" opacity="0.3">
      <circle cx="-12" cy="12" r="3"/>
      <circle cx="-8" cy="15" r="2"/>
      <circle cx="-4" cy="17" r="1.5"/>
    </g>
    
    <!-- Eyes (tiny, cute) -->
    <circle cx="-3" cy="-2" r="2" fill="#000000"/>
    <circle cx="3" cy="-2" r="2" fill="#000000"/>
    <circle cx="-2" cy="-3" r="0.8" fill="#ffffff"/>
    <circle cx="4" cy="-3" r="0.8" fill="#ffffff"/>
  </g>
</svg>

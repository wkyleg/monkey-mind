<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Final confrontation void -->
  <defs>
    <radialGradient id="finalVoid" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a0a2a">
        <animate attributeName="stop-color" values="#1a0a2a;#2a0a1a;#0a1a2a;#1a0a2a" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <filter id="finalGlow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  
  <rect width="400" height="600" fill="url(#finalVoid)"/>
  
  <!-- Reality fractures -->
  <g stroke="#4a2a6a" stroke-width="2" fill="none" opacity="0.5">
    <path d="M0,100 L100,150 L50,250 L150,200"/>
    <path d="M400,200 L300,180 L350,280 L250,250"/>
    <path d="M100,400 L200,450 L150,500 L250,480"/>
    <path d="M300,450 L350,500 L280,550"/>
  </g>
  
  <!-- Central rift -->
  <g transform="translate(200,300)" filter="url(#finalGlow)">
    <ellipse cx="0" cy="0" rx="50" ry="100" fill="#000" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="30" ry="80" fill="#1a0a2a"/>
    <ellipse cx="0" cy="0" rx="15" ry="60" fill="#2a1a4a">
      <animate attributeName="ry" values="60;70;60" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Energy tendrils from rift -->
  <g stroke="#6a4a8a" stroke-width="3" fill="none" opacity="0.4">
    <path d="M200,200 Q150,180 100,200">
      <animate attributeName="d" values="M200,200 Q150,180 100,200;M200,200 Q150,150 80,180;M200,200 Q150,180 100,200" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M200,200 Q250,180 300,200">
      <animate attributeName="d" values="M200,200 Q250,180 300,200;M200,200 Q250,150 320,180;M200,200 Q250,180 300,200" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M200,400 Q150,420 100,400">
      <animate attributeName="d" values="M200,400 Q150,420 100,400;M200,400 Q150,450 80,420;M200,400 Q150,420 100,400" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M200,400 Q250,420 300,400">
      <animate attributeName="d" values="M200,400 Q250,420 300,400;M200,400 Q250,450 320,420;M200,400 Q250,420 300,400" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating debris -->
  <g fill="#2a2a3a" opacity="0.5">
    <rect x="50" y="150" width="15" height="15" transform="rotate(30 58 158)">
      <animateTransform attributeName="transform" type="rotate" values="30 58 158;390 58 158" dur="20s" repeatCount="indefinite"/>
    </rect>
    <rect x="320" y="180" width="20" height="10" transform="rotate(-20 330 185)">
      <animateTransform attributeName="transform" type="rotate" values="-20 330 185;-380 330 185" dur="25s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="450" width="12" height="18" transform="rotate(45 86 459)">
      <animateTransform attributeName="transform" type="rotate" values="45 86 459;405 86 459" dur="18s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>

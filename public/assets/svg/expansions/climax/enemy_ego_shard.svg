<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Ego Shard - Fragment of consciousness (swarm) -->
  <defs>
    <linearGradient id="egoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#88aaff"/>
      <stop offset="100%" stop-color="#4466aa"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(25,25)">
    <!-- Crystal shard shape -->
    <polygon points="0,-18 12,-5 8,15 -8,15 -12,-5" fill="url(#egoGrad)" opacity="0.85"/>
    
    <!-- Inner facet lines -->
    <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.4">
      <line x1="0" y1="-18" x2="0" y2="15"/>
      <line x1="-12" y1="-5" x2="8" y2="15"/>
      <line x1="12" y1="-5" x2="-8" y2="15"/>
    </g>
    
    <!-- Mirror reflection of monkey (distorted) -->
    <g transform="scale(0.3)" fill="#4a2a1a" opacity="0.6">
      <circle cx="0" cy="-10" r="12"/>
      <circle cx="-10" cy="-15" r="5"/>
      <circle cx="10" cy="-15" r="5"/>
    </g>
    
    <!-- Cracks (fractured ego) -->
    <g stroke="#1a1a4a" stroke-width="1" fill="none">
      <path d="M-5,-10 L-2,-5 L-6,5"/>
      <path d="M5,-8 L3,0 L6,8"/>
    </g>
    
    <!-- Glow -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#88aaff" stroke-width="1" opacity="0.3"/>
  </g>
</svg>

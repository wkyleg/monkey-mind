<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Memory Ghost - Faded past self -->
  <defs>
    <linearGradient id="memoryFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aaccff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4466aa" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(30,35)">
    <!-- Ghostly body -->
    <ellipse cx="0" cy="5" rx="14" ry="20" fill="url(#memoryFade)"/>
    
    <!-- Fading edges -->
    <g fill="#88aaff" opacity="0.3">
      <ellipse cx="-12" cy="15" rx="5" ry="10"/>
      <ellipse cx="12" cy="15" rx="5" ry="10"/>
      <ellipse cx="0" cy="25" rx="8" ry="12"/>
    </g>
    
    <!-- Head -->
    <circle cx="0" cy="-15" r="12" fill="#88aaff" opacity="0.7"/>
    
    <!-- Monkey features (faded) -->
    <circle cx="-10" cy="-18" r="4" fill="#99bbff" opacity="0.6"/>
    <circle cx="10" cy="-18" r="4" fill="#99bbff" opacity="0.6"/>
    
    <!-- Eyes (hollow, sad) -->
    <circle cx="-4" cy="-16" r="3" fill="#2a4a8a"/>
    <circle cx="4" cy="-16" r="3" fill="#2a4a8a"/>
    <circle cx="-4" cy="-16" r="1" fill="#ffffff" opacity="0.5"/>
    <circle cx="4" cy="-16" r="1" fill="#ffffff" opacity="0.5"/>
    
    <!-- Snout -->
    <ellipse cx="0" cy="-9" rx="5" ry="4" fill="#aaccff" opacity="0.5"/>
    
    <!-- Memory fragments floating off -->
    <g fill="#aaccff" opacity="0.4">
      <rect x="-20" y="-10" width="4" height="4" transform="rotate(15,-18,-8)"/>
      <rect x="18" y="-5" width="3" height="3" transform="rotate(-20,19.5,-3.5)"/>
      <rect x="-18" y="10" width="3" height="3" transform="rotate(30,-16.5,11.5)"/>
      <rect x="16" y="15" width="4" height="4" transform="rotate(-10,18,17)"/>
    </g>
    
    <!-- Static/noise effect -->
    <g stroke="#ffffff" stroke-width="0.5" opacity="0.2">
      <line x1="-8" y1="-5" x2="-6" y2="-5"/>
      <line x1="5" y1="0" x2="7" y2="0"/>
      <line x1="-3" y1="8" x2="-1" y2="8"/>
      <line x1="2" y1="12" x2="4" y2="12"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Traditional Japanese dojo -->
  <rect width="400" height="600" fill="#2a1a0a"/>
  
  <!-- Tatami floor pattern -->
  <g opacity="0.3">
    <pattern id="tatami" width="80" height="40" patternUnits="userSpaceOnUse">
      <rect width="80" height="40" fill="#5a4a2a"/>
      <line x1="0" y1="0" x2="80" y2="0" stroke="#3a2a1a" stroke-width="1"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="#3a2a1a" stroke-width="1"/>
    </pattern>
    <rect x="0" y="350" width="400" height="250" fill="url(#tatami)"/>
  </g>
  
  <!-- Shoji screens -->
  <g fill="#f5f0e0" opacity="0.2">
    <rect x="0" y="100" width="120" height="200"/>
    <rect x="280" y="100" width="120" height="200"/>
  </g>
  <g stroke="#8a6a4a" stroke-width="2">
    <line x1="40" y1="100" x2="40" y2="300"/>
    <line x1="80" y1="100" x2="80" y2="300"/>
    <line x1="320" y1="100" x2="320" y2="300"/>
    <line x1="360" y1="100" x2="360" y2="300"/>
    <line x1="0" y1="200" x2="120" y2="200"/>
    <line x1="280" y1="200" x2="400" y2="200"/>
  </g>
  
  <!-- Tokonoma (alcove) -->
  <rect x="150" y="80" width="100" height="150" fill="#1a0a00"/>
  
  <!-- Scroll -->
  <rect x="180" y="100" width="40" height="80" fill="#f5f0e0"/>
  <text x="200" y="150" fill="#1a0a00" font-family="serif" font-size="20" text-anchor="middle">道</text>
  
  <!-- Ikebana (flower arrangement) -->
  <g transform="translate(200,200)">
    <rect x="-10" y="0" width="20" height="15" fill="#4a4a4a"/>
    <line x1="0" y1="0" x2="-15" y2="-30" stroke="#4a6a2a" stroke-width="2"/>
    <line x1="0" y1="0" x2="10" y2="-25" stroke="#4a6a2a" stroke-width="2"/>
    <circle cx="-15" cy="-35" r="5" fill="#ff6a8a"/>
    <circle cx="10" cy="-28" r="4" fill="#ffa0b0"/>
  </g>
  
  <!-- Katana on stand -->
  <g transform="translate(320,450)">
    <rect x="-30" y="0" width="60" height="8" fill="#2a1a0a"/>
    <rect x="-20" y="-5" width="40" height="5" fill="#4a3a2a"/>
    <rect x="-25" y="-8" width="50" height="3" fill="#8a8a8a"/>
    <rect x="20" y="-10" width="8" height="5" fill="#1a0a00"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Jungle Wraith - Spirit of lost civilizations -->
  <defs>
    <linearGradient id="wraithGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4a2a"/>
      <stop offset="100%" stop-color="#0a1a0a" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(30,35)">
    <!-- Wispy body -->
    <ellipse cx="0" cy="0" rx="15" ry="25" fill="url(#wraithGrad)" opacity="0.7"/>
    
    <!-- Vine-like tendrils -->
    <g stroke="#1a3a1a" stroke-width="3" fill="none">
      <path d="M-10,-10 Q-25,-5 -20,15 Q-15,30 -25,35"/>
      <path d="M10,-10 Q25,-5 20,15 Q15,30 25,35"/>
      <path d="M0,20 Q5,30 0,40"/>
    </g>
    
    <!-- Mask face (ancient artifact) -->
    <ellipse cx="0" cy="-10" rx="10" ry="12" fill="#c9a227"/>
    
    <!-- Mask details -->
    <g fill="#1a0a00">
      <ellipse cx="-4" cy="-12" rx="3" ry="4"/>
      <ellipse cx="4" cy="-12" rx="3" ry="4"/>
      <ellipse cx="0" cy="-4" rx="2" ry="3"/>
    </g>
    
    <!-- Glowing eyes through mask -->
    <circle cx="-4" cy="-12" r="2" fill="#00ff00" opacity="0.8"/>
    <circle cx="4" cy="-12" r="2" fill="#00ff00" opacity="0.8"/>
    
    <!-- Feathers on mask -->
    <g fill="#ff4400" opacity="0.7">
      <ellipse cx="-12" cy="-18" rx="3" ry="8" transform="rotate(-20,-12,-18)"/>
      <ellipse cx="12" cy="-18" rx="3" ry="8" transform="rotate(20,12,-18)"/>
      <ellipse cx="0" cy="-24" rx="2" ry="6"/>
    </g>
    
    <!-- Leaves floating around -->
    <g fill="#2a5a2a" opacity="0.5">
      <ellipse cx="-18" cy="5" rx="4" ry="2" transform="rotate(-30,-18,5)"/>
      <ellipse cx="18" cy="-5" rx="4" ry="2" transform="rotate(30,18,-5)"/>
    </g>
  </g>
</svg>

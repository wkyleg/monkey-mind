<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Lascaux Cave Wall Background -->
  <defs>
    <radialGradient id="torchGlow" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#2a1a0a" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#1a0a00" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0a0500" stop-opacity="1"/>
    </radialGradient>
    
    <filter id="rockTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4"/>
      <feColorMatrix type="saturate" values="0.2"/>
    </filter>
    
    <pattern id="cavePattern" patternUnits="userSpaceOnUse" width="200" height="200">
      <rect width="200" height="200" fill="#2a1f15"/>
      <circle cx="30" cy="40" r="25" fill="#241a10" opacity="0.5"/>
      <circle cx="150" cy="80" r="35" fill="#201610" opacity="0.4"/>
      <ellipse cx="80" cy="150" rx="40" ry="25" fill="#261c12" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Base cave wall -->
  <rect width="800" height="600" fill="url(#cavePattern)"/>
  
  <!-- Rock texture overlay -->
  <rect width="800" height="600" fill="#1a1008" opacity="0.4"/>
  
  <!-- Cave depth shadows -->
  <ellipse cx="200" cy="150" rx="150" ry="100" fill="#0a0500" opacity="0.4"/>
  <ellipse cx="600" cy="400" rx="180" ry="120" fill="#0a0500" opacity="0.3"/>
  
  <!-- Torchlight gradient from bottom -->
  <rect width="800" height="600" fill="url(#torchGlow)"/>
  
  <!-- Rock formations -->
  <g fill="#3a2a1a" opacity="0.6">
    <polygon points="0,300 50,250 120,280 80,350 0,320"/>
    <polygon points="700,200 750,150 800,180 800,260 720,240"/>
    <polygon points="350,0 400,50 380,100 320,80 330,0"/>
    <polygon points="0,450 80,400 120,480 60,520 0,500"/>
  </g>
  
  <!-- Subtle cave wall cracks -->
  <g stroke="#1a1008" stroke-width="2" fill="none" opacity="0.5">
    <path d="M100,100 L150,180 L130,250"/>
    <path d="M500,50 L480,120 L520,200 L490,280"/>
    <path d="M650,300 L700,380 L680,450"/>
    <path d="M200,400 L280,450 L250,520"/>
  </g>
</svg>

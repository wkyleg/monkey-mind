<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <!-- Handprint Swarm - Small fast-moving ancient handprints -->
  <g transform="translate(25,25)">
    <!-- Main handprint -->
    <g fill="#c4713a" opacity="0.8">
      <!-- Palm -->
      <ellipse cx="0" cy="2" rx="10" ry="12"/>
      
      <!-- Fingers -->
      <ellipse cx="-7" cy="-14" rx="3" ry="10"/>
      <ellipse cx="-2" cy="-18" rx="2.5" ry="12"/>
      <ellipse cx="4" cy="-17" rx="2.5" ry="11"/>
      <ellipse cx="9" cy="-13" rx="3" ry="9"/>
      
      <!-- Thumb -->
      <ellipse cx="13" cy="-4" rx="3" ry="8" transform="rotate(30,13,-4)"/>
    </g>
    
    <!-- Eerie center glow -->
    <circle cx="0" cy="0" r="5" fill="#ff6633" opacity="0.4"/>
    
    <!-- Eye in palm (eerie) -->
    <circle cx="0" cy="0" r="4" fill="#1a0a00"/>
    <circle cx="0" cy="0" r="2" fill="#ff4400"/>
    <circle cx="1" cy="-1" r="0.8" fill="#ffffff"/>
    
    <!-- Paint drips -->
    <g fill="#a85a2a" opacity="0.6">
      <ellipse cx="-5" cy="14" rx="2" ry="4"/>
      <ellipse cx="3" cy="15" rx="1.5" ry="5"/>
    </g>
  </g>
</svg>

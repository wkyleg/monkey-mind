<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Lascaux Cave Paintings Overlay -->
  <defs>
    <filter id="ancientPaint">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
  </defs>
  
  <!-- Transparent background -->
  <rect width="800" height="600" fill="transparent"/>
  
  <!-- Ancient animal paintings -->
  <g fill="#8b4513" opacity="0.6" filter="url(#ancientPaint)">
    <!-- Bull/Auroch -->
    <g transform="translate(150,120) scale(0.8)">
      <ellipse cx="60" cy="30" rx="50" ry="25"/>
      <circle cx="10" cy="15" r="15"/>
      <path d="M-5,5 L-20,-15 M25,5 L35,-15" stroke="#8b4513" stroke-width="4" fill="none"/>
      <rect x="30" y="45" width="10" height="35"/>
      <rect x="50" y="45" width="10" height="35"/>
      <rect x="70" y="45" width="10" height="35"/>
      <rect x="90" y="45" width="10" height="35"/>
    </g>
    
    <!-- Horse -->
    <g transform="translate(500,200) scale(0.7)">
      <ellipse cx="50" cy="25" rx="45" ry="20"/>
      <ellipse cx="5" cy="10" rx="20" ry="15"/>
      <path d="M-15,0 L-25,-20" stroke="#8b4513" stroke-width="3" fill="none"/>
      <rect x="25" y="40" width="8" height="40"/>
      <rect x="45" y="40" width="8" height="40"/>
      <rect x="60" y="40" width="8" height="40"/>
      <rect x="80" y="40" width="8" height="40"/>
      <path d="M90,25 L120,35" stroke="#8b4513" stroke-width="4" fill="none"/>
    </g>
    
    <!-- Deer -->
    <g transform="translate(650,80) scale(0.5)">
      <ellipse cx="40" cy="25" rx="35" ry="18"/>
      <circle cx="5" cy="10" r="12"/>
      <path d="M0,-5 L-15,-35 L-5,-40 M0,-5 L15,-35 L25,-40" stroke="#8b4513" stroke-width="3" fill="none"/>
      <rect x="20" y="38" width="6" height="30"/>
      <rect x="35" y="38" width="6" height="30"/>
      <rect x="50" y="38" width="6" height="30"/>
    </g>
  </g>
  
  <!-- Hand prints - ochre color -->
  <g fill="#c4713a" opacity="0.5">
    <g transform="translate(100,400)">
      <ellipse cx="0" cy="0" rx="12" ry="15"/>
      <ellipse cx="-8" cy="-20" rx="4" ry="12"/>
      <ellipse cx="-2" cy="-25" rx="3" ry="14"/>
      <ellipse cx="5" cy="-24" rx="3" ry="13"/>
      <ellipse cx="11" cy="-20" rx="4" ry="11"/>
      <ellipse cx="16" cy="-12" rx="4" ry="9"/>
    </g>
    <g transform="translate(700,350) scale(0.8)">
      <ellipse cx="0" cy="0" rx="12" ry="15"/>
      <ellipse cx="-8" cy="-20" rx="4" ry="12"/>
      <ellipse cx="-2" cy="-25" rx="3" ry="14"/>
      <ellipse cx="5" cy="-24" rx="3" ry="13"/>
      <ellipse cx="11" cy="-20" rx="4" ry="11"/>
      <ellipse cx="16" cy="-12" rx="4" ry="9"/>
    </g>
    <g transform="translate(300,480) scale(0.6)">
      <ellipse cx="0" cy="0" rx="12" ry="15"/>
      <ellipse cx="-8" cy="-20" rx="4" ry="12"/>
      <ellipse cx="-2" cy="-25" rx="3" ry="14"/>
      <ellipse cx="5" cy="-24" rx="3" ry="13"/>
      <ellipse cx="11" cy="-20" rx="4" ry="11"/>
      <ellipse cx="16" cy="-12" rx="4" ry="9"/>
    </g>
  </g>
  
  <!-- Geometric symbols -->
  <g stroke="#5a3a2a" stroke-width="3" fill="none" opacity="0.4">
    <rect x="400" y="450" width="30" height="30"/>
    <circle cx="550" cy="500" r="15"/>
    <polygon points="620,480 635,510 605,510"/>
    <line x1="250" y1="280" x2="280" y2="320"/>
    <line x1="260" y1="280" x2="290" y2="320"/>
  </g>
</svg>

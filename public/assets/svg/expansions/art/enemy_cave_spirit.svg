<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Cave Spirit - Prehistoric ochre figure that drifts -->
  <defs>
    <filter id="ancient">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2"/>
      <feDisplacementMap in="SourceGraphic" scale="1"/>
    </filter>
  </defs>
  
  <g transform="translate(30,30)" filter="url(#ancient)">
    <!-- Body - rough ochre silhouette -->
    <ellipse cx="0" cy="5" rx="12" ry="18" fill="#c4713a" opacity="0.9"/>
    
    <!-- Head -->
    <circle cx="0" cy="-15" r="10" fill="#a85a2a"/>
    
    <!-- Hollow eyes -->
    <circle cx="-4" cy="-16" r="3" fill="#1a0a00"/>
    <circle cx="4" cy="-16" r="3" fill="#1a0a00"/>
    
    <!-- Faint glow in eyes -->
    <circle cx="-4" cy="-16" r="1.5" fill="#ff6633" opacity="0.6"/>
    <circle cx="4" cy="-16" r="1.5" fill="#ff6633" opacity="0.6"/>
    
    <!-- Arms reaching out -->
    <g stroke="#c4713a" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M-10,-2 L-20,-8"/>
      <path d="M10,-2 L20,-8"/>
    </g>
    
    <!-- Dripping/dissolving bottom -->
    <g fill="#a85a2a" opacity="0.7">
      <ellipse cx="-6" cy="22" rx="4" ry="8"/>
      <ellipse cx="0" cy="25" rx="3" ry="10"/>
      <ellipse cx="6" cy="23" rx="4" ry="7"/>
    </g>
    
    <!-- Ancient symbols on body -->
    <g stroke="#5a3020" stroke-width="1.5" fill="none" opacity="0.5">
      <circle cx="0" cy="0" r="5"/>
      <line x1="-3" y1="8" x2="3" y2="8"/>
      <line x1="0" y1="5" x2="0" y2="11"/>
    </g>
  </g>
</svg>

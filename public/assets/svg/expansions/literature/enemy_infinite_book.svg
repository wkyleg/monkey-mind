<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Infinite Book - Library of Babel entity (swarm) -->
  <g transform="translate(30,30)">
    <!-- Book body -->
    <rect x="-12" y="-15" width="24" height="30" fill="#8b4513" rx="2"/>
    
    <!-- Pages -->
    <rect x="-10" y="-13" width="20" height="26" fill="#f5f5dc"/>
    
    <!-- Infinite text (illegible) -->
    <g fill="#2a1810" opacity="0.6" font-size="3">
      <text x="-8" y="-8">∞ℵ∑Ω</text>
      <text x="-8" y="-4">π∫∂∇</text>
      <text x="-8" y="0">ℶℷℸ℩</text>
      <text x="-8" y="4">∀∃∄∅</text>
      <text x="-8" y="8">∆∇∈∉</text>
    </g>
    
    <!-- Spine -->
    <rect x="-14" y="-15" width="4" height="30" fill="#5a3010"/>
    
    <!-- Eye in the center (book sees all) -->
    <circle cx="2" cy="0" r="6" fill="#1a0a00"/>
    <circle cx="2" cy="0" r="4" fill="#ffd700"/>
    <circle cx="2" cy="0" r="2" fill="#000000"/>
    <circle cx="3" cy="-1" r="1" fill="#ffffff"/>
    
    <!-- Floating letters around -->
    <g fill="#2a1810" opacity="0.5" font-size="6">
      <text x="-22" y="-10">A</text>
      <text x="18" y="-5">Ω</text>
      <text x="-20" y="15">∞</text>
      <text x="16" y="12">ℵ</text>
    </g>
    
    <!-- Glow effect -->
    <circle cx="2" cy="0" r="10" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
  </g>
</svg>

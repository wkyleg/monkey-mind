<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70">
  <!-- Black Hole - Cosmic physics enemy (anchor/stationary) -->
  <defs>
    <radialGradient id="eventHorizon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="70%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <g transform="translate(35,35)">
    <!-- Accretion disk -->
    <ellipse cx="0" cy="0" rx="30" ry="10" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.6" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="25" ry="8" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.5" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="20" ry="6" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.4" transform="rotate(-20)"/>
    
    <!-- Event horizon -->
    <circle cx="0" cy="0" r="15" fill="url(#eventHorizon)"/>
    
    <!-- Singularity core -->
    <circle cx="0" cy="0" r="5" fill="#000000"/>
    
    <!-- Gravitational lensing effect -->
    <g stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.2">
      <ellipse cx="-20" cy="-15" rx="8" ry="3" transform="rotate(30,-20,-15)"/>
      <ellipse cx="20" cy="-12" rx="6" ry="2" transform="rotate(-40,20,-12)"/>
      <ellipse cx="18" cy="18" rx="7" ry="2" transform="rotate(50,18,18)"/>
    </g>
    
    <!-- Matter being pulled in -->
    <g fill="#ff8800" opacity="0.6">
      <circle cx="-22" cy="5" r="2"/>
      <circle cx="-18" cy="3" r="1.5"/>
      <circle cx="22" cy="-5" r="2"/>
      <circle cx="18" cy="-3" r="1.5"/>
    </g>
    
    <!-- Hawking radiation -->
    <g fill="#8800ff" opacity="0.3">
      <circle cx="0" cy="-18" r="2"/>
      <circle cx="0" cy="18" r="2"/>
    </g>
  </g>
</svg>

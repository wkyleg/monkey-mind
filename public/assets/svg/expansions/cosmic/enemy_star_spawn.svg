<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70">
  <!-- Star Spawn - Eldritch tentacled horror -->
  <defs>
    <radialGradient id="voidGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <g transform="translate(35,35)">
    <!-- Void glow -->
    <circle cx="0" cy="0" r="30" fill="url(#voidGlow)"/>
    
    <!-- Main body mass - amorphous -->
    <ellipse cx="0" cy="0" rx="18" ry="15" fill="#1a0a2a" opacity="0.9"/>
    
    <!-- Multiple eyes (non-euclidean arrangement) -->
    <g>
      <circle cx="0" cy="-5" r="6" fill="#0a0515"/>
      <circle cx="0" cy="-5" r="4" fill="#00ff88"/>
      <circle cx="1" cy="-6" r="2" fill="#ffffff"/>
      
      <circle cx="-10" cy="0" r="4" fill="#0a0515"/>
      <circle cx="-10" cy="0" r="2.5" fill="#ff00ff"/>
      <circle cx="-9" cy="-1" r="1" fill="#ffffff"/>
      
      <circle cx="10" cy="-2" r="3" fill="#0a0515"/>
      <circle cx="10" cy="-2" r="2" fill="#00ff88"/>
      
      <circle cx="5" cy="5" r="2.5" fill="#0a0515"/>
      <circle cx="5" cy="5" r="1.5" fill="#ff00ff"/>
    </g>
    
    <!-- Tentacles -->
    <g stroke="#2a1a4a" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M-15,5 Q-25,0 -28,10 Q-30,20 -22,25"/>
      <path d="M-12,10 Q-20,15 -18,25 Q-15,32 -8,30"/>
      <path d="M0,15 Q5,25 0,32 Q-5,38 -10,35"/>
      <path d="M12,10 Q20,15 18,25 Q15,32 8,30"/>
      <path d="M15,5 Q25,0 28,10 Q30,20 22,25"/>
    </g>
    
    <!-- Tentacle tips with suckers -->
    <g fill="#3a2a5a">
      <circle cx="-22" cy="25" r="3"/>
      <circle cx="-8" cy="30" r="2.5"/>
      <circle cx="-10" cy="35" r="2"/>
      <circle cx="8" cy="30" r="2.5"/>
      <circle cx="22" cy="25" r="3"/>
    </g>
    
    <!-- Eldritch aura -->
    <g stroke="#ff00ff" stroke-width="1" fill="none" opacity="0.3">
      <circle cx="0" cy="0" r="25"/>
      <circle cx="0" cy="0" r="28"/>
    </g>
  </g>
</svg>

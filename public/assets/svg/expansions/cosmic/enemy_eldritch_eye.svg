<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Eldritch floating eye -->
  <g transform="translate(30,30)">
    <!-- Outer membrane -->
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#2a1a3a"/>
    
    <!-- Bloodshot veins -->
    <g stroke="#6a2a3a" stroke-width="0.5" fill="none" opacity="0.6">
      <path d="M-18,0 Q-10,-5 -8,0"/>
      <path d="M-17,-8 Q-10,-5 -5,-8"/>
      <path d="M-17,8 Q-10,5 -5,8"/>
      <path d="M18,0 Q10,-5 8,0"/>
      <path d="M17,-8 Q10,-5 5,-8"/>
      <path d="M17,8 Q10,5 5,8"/>
    </g>
    
    <!-- Iris -->
    <circle cx="0" cy="0" r="10" fill="#1a4a1a"/>
    
    <!-- Pupil (vertical slit) -->
    <ellipse cx="0" cy="0" rx="3" ry="8" fill="#000">
      <animate attributeName="rx" values="3;1;3" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Highlight -->
    <circle cx="-4" cy="-4" r="2" fill="#4a8a4a" opacity="0.5"/>
    
    <!-- Tentacle wisps around eye -->
    <g stroke="#4a2a5a" stroke-width="2" fill="none" opacity="0.5">
      <path d="M-15,-12 Q-20,-20 -15,-25">
        <animate attributeName="d" values="M-15,-12 Q-20,-20 -15,-25;M-15,-12 Q-25,-18 -18,-25;M-15,-12 Q-20,-20 -15,-25" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M15,-12 Q20,-20 15,-25">
        <animate attributeName="d" values="M15,-12 Q20,-20 15,-25;M15,-12 Q25,-18 18,-25;M15,-12 Q20,-20 15,-25" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <path d="M0,15 Q0,22 5,25">
        <animate attributeName="d" values="M0,15 Q0,22 5,25;M0,15 Q-5,22 -5,25;M0,15 Q0,22 5,25" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Deep One - Fish-like humanoid from R'lyeh -->
  <g transform="translate(30,35)">
    <!-- Body - scaled humanoid -->
    <ellipse cx="0" cy="5" rx="12" ry="18" fill="#1a3a3a"/>
    
    <!-- Scale pattern -->
    <g fill="#0a2a2a" opacity="0.6">
      <ellipse cx="-6" cy="-5" rx="4" ry="3"/>
      <ellipse cx="6" cy="-5" rx="4" ry="3"/>
      <ellipse cx="0" cy="0" rx="4" ry="3"/>
      <ellipse cx="-6" cy="5" rx="4" ry="3"/>
      <ellipse cx="6" cy="5" rx="4" ry="3"/>
      <ellipse cx="0" cy="10" rx="4" ry="3"/>
      <ellipse cx="-4" cy="15" rx="3" ry="2.5"/>
      <ellipse cx="4" cy="15" rx="3" ry="2.5"/>
    </g>
    
    <!-- Head - bulbous fish-like -->
    <ellipse cx="0" cy="-18" rx="14" ry="10" fill="#1a4a4a"/>
    
    <!-- Bulging fish eyes -->
    <circle cx="-8" cy="-20" r="6" fill="#0a2020"/>
    <circle cx="8" cy="-20" r="6" fill="#0a2020"/>
    <circle cx="-8" cy="-20" r="4" fill="#ffff00"/>
    <circle cx="8" cy="-20" r="4" fill="#ffff00"/>
    <circle cx="-7" cy="-21" r="2" fill="#000000"/>
    <circle cx="9" cy="-21" r="2" fill="#000000"/>
    
    <!-- Mouth with teeth -->
    <path d="M-8,-10 Q0,-6 8,-10" stroke="#0a2020" stroke-width="2" fill="none"/>
    <g fill="#ffffff">
      <polygon points="-6,-10 -5,-7 -4,-10"/>
      <polygon points="-2,-9 -1,-6 0,-9"/>
      <polygon points="2,-9 3,-6 4,-9"/>
      <polygon points="6,-10 7,-7 8,-10"/>
    </g>
    
    <!-- Fins/Frills -->
    <g fill="#0a3a3a" opacity="0.8">
      <path d="M0,-28 L-5,-22 L0,-20 L5,-22 Z"/>
      <path d="M-14,-15 L-20,-10 L-14,-5"/>
      <path d="M14,-15 L20,-10 L14,-5"/>
    </g>
    
    <!-- Webbed arms -->
    <g stroke="#1a4a4a" stroke-width="4" fill="none">
      <path d="M-12,0 L-22,-5"/>
      <path d="M12,0 L22,-5"/>
    </g>
    <g fill="#1a4a4a">
      <path d="M-22,-5 L-28,0 L-22,5 L-20,0 Z"/>
      <path d="M22,-5 L28,0 L22,5 L20,0 Z"/>
    </g>
    
    <!-- Gills -->
    <g stroke="#0a3a3a" stroke-width="1" fill="none">
      <path d="M-14,-2 L-16,0 L-14,2"/>
      <path d="M-14,3 L-16,5 L-14,7"/>
      <path d="M14,-2 L16,0 L14,2"/>
      <path d="M14,3 L16,5 L14,7"/>
    </g>
  </g>
</svg>

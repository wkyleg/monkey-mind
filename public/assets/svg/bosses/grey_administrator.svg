<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Grey Administrator - Corporate Horror, Faceless Bureaucrat -->
  <defs>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <radialGradient id="voidFace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glitch">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background static/noise suggestion -->
  <g opacity="0.1">
    <line x1="0" y1="20" x2="128" y2="20" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="128" y2="60" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="128" y2="100" stroke="#ffffff" stroke-width="0.5"/>
  </g>
  
  <!-- Corporate suit body -->
  <path d="M44 128 L44 75 Q44 65 54 60 L64 55 L74 60 Q84 65 84 75 L84 128" 
        fill="url(#suitGrad)" stroke="#2a2a34" stroke-width="1"/>
  
  <!-- Suit lapels -->
  <path d="M54 60 L64 80 L74 60" fill="none" stroke="#4a4a5a" stroke-width="2"/>
  
  <!-- Tie (red, corporate) -->
  <path d="M64 60 L60 75 L64 110 L68 75 Z" fill="#660022" stroke="#440011" stroke-width="0.5"/>
  <path d="M60 60 L64 55 L68 60 L64 65 Z" fill="#880033"/>
  
  <!-- Shirt collar -->
  <path d="M56 58 L64 52 L72 58" fill="none" stroke="#cccccc" stroke-width="1"/>
  
  <!-- Shoulders (angular, imposing) -->
  <path d="M44 75 L30 80 L30 90 L44 85" fill="url(#suitGrad)" stroke="#2a2a34" stroke-width="1"/>
  <path d="M84 75 L98 80 L98 90 L84 85" fill="url(#suitGrad)" stroke="#2a2a34" stroke-width="1"/>
  
  <!-- Head - featureless void -->
  <ellipse cx="64" cy="35" rx="22" ry="26" fill="url(#voidFace)" stroke="#1a1a24" stroke-width="2"/>
  
  <!-- Glitching face lines - suggestion of features that aren't there -->
  <g stroke="#333344" stroke-width="0.5" opacity="0.4">
    <line x1="52" y1="28" x2="58" y2="28"/>
    <line x1="70" y1="28" x2="76" y2="28"/>
    <line x1="56" y1="42" x2="72" y2="42"/>
  </g>
  
  <!-- Static/corruption over face -->
  <g filter="url(#glitch)" opacity="0.3">
    <rect x="48" y="25" width="32" height="2" fill="#ff0000"/>
    <rect x="50" y="35" width="28" height="1" fill="#00ff00"/>
    <rect x="46" y="40" width="36" height="1" fill="#0000ff"/>
  </g>
  
  <!-- Single glowing eye emerging from void -->
  <circle cx="64" cy="32" r="6" fill="#cc0066" filter="url(#glitch)"/>
  <circle cx="64" cy="32" r="3" fill="#ff0088"/>
  <circle cx="64" cy="32" r="1" fill="#ffffff"/>
  
  <!-- Floating bureaucratic elements -->
  <!-- Clipboard with denied stamp -->
  <g transform="translate(8, 30)">
    <rect x="0" y="0" width="20" height="26" fill="#e8e8e0" stroke="#666666" stroke-width="0.5"/>
    <rect x="2" y="3" width="16" height="2" fill="#aaaaaa"/>
    <rect x="2" y="7" width="14" height="2" fill="#aaaaaa"/>
    <rect x="2" y="11" width="16" height="2" fill="#aaaaaa"/>
    <rect x="4" y="16" width="12" height="8" fill="#cc0000" opacity="0.8"/>
    <text x="10" y="22" font-family="monospace" font-size="4" fill="#ffffff" text-anchor="middle">DENIED</text>
  </g>
  
  <!-- Floating forms -->
  <g transform="translate(100, 40) rotate(15)">
    <rect x="0" y="0" width="18" height="24" fill="#f0f0e8" stroke="#666666" stroke-width="0.5"/>
    <rect x="2" y="3" width="14" height="1" fill="#333333"/>
    <rect x="2" y="6" width="10" height="1" fill="#333333"/>
    <rect x="2" y="9" width="14" height="1" fill="#333333"/>
    <rect x="2" y="12" width="8" height="1" fill="#333333"/>
  </g>
  
  <!-- Redacted document -->
  <g transform="translate(6, 85) rotate(-5)">
    <rect x="0" y="0" width="22" height="16" fill="#ffffff" stroke="#333333" stroke-width="0.5"/>
    <rect x="2" y="3" width="18" height="3" fill="#000000"/>
    <rect x="2" y="8" width="14" height="3" fill="#000000"/>
  </g>
  
  <!-- Floating pen -->
  <g transform="translate(105, 75) rotate(25)">
    <rect x="0" y="0" width="4" height="22" fill="#1a1a2e" stroke="#333344" stroke-width="0.5"/>
    <polygon points="0,22 2,28 4,22" fill="#888888"/>
  </g>
  
  <!-- Data streams -->
  <g font-family="monospace" font-size="4" fill="#cc0066" opacity="0.5">
    <text x="20" y="120">FORM-7734</text>
    <text x="80" y="15">SUBJECT:7</text>
    <text x="90" y="120">STATUS:VOID</text>
  </g>
  
  <!-- Corporate badge -->
  <rect x="48" y="65" width="12" height="8" fill="#1a1a24" stroke="#cc0066" stroke-width="0.5"/>
  <text x="54" y="71" font-family="monospace" font-size="4" fill="#cc0066" text-anchor="middle">ID</text>
</svg>

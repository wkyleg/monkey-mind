<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Banana Pentagon - Primate Conspiracy, Military-Industrial Complex -->
  <defs>
    <linearGradient id="militaryGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3a2a"/>
      <stop offset="100%" stop-color="#1a2a1a"/>
    </linearGradient>
    <linearGradient id="goldenBanana" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <filter id="secretGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Pentagon building shape -->
  <polygon points="64,8 116,40 100,108 28,108 12,40" 
           fill="url(#militaryGreen)" 
           stroke="#3a4a3a" 
           stroke-width="3"/>
  
  <!-- Inner pentagon (courtyard) -->
  <polygon points="64,28 92,48 82,88 46,88 36,48" 
           fill="#0a0a0f" 
           stroke="#2a3a2a" 
           stroke-width="2"/>
  
  <!-- Pentagon sections (5 wedges) -->
  <g stroke="#3a4a3a" stroke-width="1" fill="none">
    <line x1="64" y1="8" x2="64" y2="28"/>
    <line x1="116" y1="40" x2="92" y2="48"/>
    <line x1="100" y1="108" x2="82" y2="88"/>
    <line x1="28" y1="108" x2="46" y2="88"/>
    <line x1="12" y1="40" x2="36" y2="48"/>
  </g>
  
  <!-- All-seeing eye in center -->
  <polygon points="64,38 78,68 64,78 50,68" fill="#1a1a24" stroke="#ffd700" stroke-width="1"/>
  <circle cx="64" cy="58" r="12" fill="#0a0a0f" stroke="#ffd700" stroke-width="1" filter="url(#secretGlow)"/>
  <circle cx="64" cy="58" r="8" fill="#ffd700" filter="url(#secretGlow)"/>
  <circle cx="64" cy="58" r="4" fill="#000000"/>
  <circle cx="64" cy="58" r="2" fill="#ff3300"/>
  
  <!-- Radiating lines from eye -->
  <g stroke="#ffd700" stroke-width="0.5" opacity="0.4">
    <line x1="64" y1="38" x2="64" y2="20"/>
    <line x1="78" y1="68" x2="95" y2="75"/>
    <line x1="50" y1="68" x2="33" y2="75"/>
    <line x1="72" y1="50" x2="85" y2="35"/>
    <line x1="56" y1="50" x2="43" y2="35"/>
  </g>
  
  <!-- Banana symbols at vertices (military insignia style) -->
  <g filter="url(#secretGlow)">
    <!-- Top -->
    <g transform="translate(64, 14)">
      <path d="M-6,0 Q-4,-6 0,-8 Q4,-6 6,0 Q4,4 0,6 Q-4,4 -6,0 Z" 
            fill="url(#goldenBanana)" stroke="#8b4513" stroke-width="0.5"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(108, 42)">
      <path d="M-6,0 Q-4,-6 0,-8 Q4,-6 6,0 Q4,4 0,6 Q-4,4 -6,0 Z" 
            fill="url(#goldenBanana)" stroke="#8b4513" stroke-width="0.5"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(94, 102)">
      <path d="M-6,0 Q-4,-6 0,-8 Q4,-6 6,0 Q4,4 0,6 Q-4,4 -6,0 Z" 
            fill="url(#goldenBanana)" stroke="#8b4513" stroke-width="0.5"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(34, 102)">
      <path d="M-6,0 Q-4,-6 0,-8 Q4,-6 6,0 Q4,4 0,6 Q-4,4 -6,0 Z" 
            fill="url(#goldenBanana)" stroke="#8b4513" stroke-width="0.5"/>
    </g>
    <!-- Top-left -->
    <g transform="translate(20, 42)">
      <path d="M-6,0 Q-4,-6 0,-8 Q4,-6 6,0 Q4,4 0,6 Q-4,4 -6,0 Z" 
            fill="url(#goldenBanana)" stroke="#8b4513" stroke-width="0.5"/>
    </g>
  </g>
  
  <!-- Classification stamps -->
  <g font-family="monospace" font-size="4" fill="#ff3300" opacity="0.8">
    <text x="64" y="95" text-anchor="middle">TOP SECRET</text>
    <text x="64" y="100" text-anchor="middle" font-size="3">PRIMATE DIVISION</text>
  </g>
  
  <!-- Military stars -->
  <g fill="#ffd700" opacity="0.6">
    <polygon points="20,20 22,26 28,26 23,30 25,36 20,32 15,36 17,30 12,26 18,26" transform="scale(0.5) translate(10,10)"/>
    <polygon points="20,20 22,26 28,26 23,30 25,36 20,32 15,36 17,30 12,26 18,26" transform="scale(0.5) translate(200,10)"/>
  </g>
  
  <!-- Redacted text lines -->
  <g fill="#1a2a1a">
    <rect x="18" y="70" width="25" height="3"/>
    <rect x="85" y="70" width="25" height="3"/>
    <rect x="18" y="76" width="18" height="3"/>
    <rect x="92" y="76" width="18" height="3"/>
  </g>
  
  <!-- Conspiracy web lines -->
  <g stroke="#ffd700" stroke-width="0.3" opacity="0.2">
    <line x1="64" y1="14" x2="108" y2="42"/>
    <line x1="108" y1="42" x2="94" y2="102"/>
    <line x1="94" y1="102" x2="34" y2="102"/>
    <line x1="34" y1="102" x2="20" y2="42"/>
    <line x1="20" y1="42" x2="64" y2="14"/>
  </g>
  
  <!-- Corner brackets (classified document style) -->
  <g stroke="#3a4a3a" stroke-width="1" fill="none">
    <path d="M4 4 L4 16 M4 4 L16 4"/>
    <path d="M124 4 L124 16 M124 4 L112 4"/>
    <path d="M4 124 L4 112 M4 124 L16 124"/>
    <path d="M124 124 L124 112 M124 124 L112 124"/>
  </g>
</svg>

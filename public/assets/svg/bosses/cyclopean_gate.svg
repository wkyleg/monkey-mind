<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <defs>
    <linearGradient id="gate_stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="50%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
    <filter id="gate_glow">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Stone gate pillars -->
  <rect x="5" y="20" width="25" height="110" fill="url(#gate_stone)" stroke="#ffd700" stroke-width="1"/>
  <rect x="90" y="20" width="25" height="110" fill="url(#gate_stone)" stroke="#ffd700" stroke-width="1"/>
  <!-- Gate arch -->
  <path d="M5 20 Q60 -10 115 20" fill="none" stroke="url(#gate_stone)" stroke-width="15"/>
  <path d="M5 20 Q60 -10 115 20" fill="none" stroke="#ffd700" stroke-width="2"/>
  <!-- Cyclopean eye in center -->
  <circle cx="60" cy="60" r="25" fill="#1a0a2a" stroke="#ffd700" stroke-width="2"/>
  <circle cx="60" cy="60" r="18" fill="#330066" filter="url(#gate_glow)">
    <animate attributeName="r" values="18;15;18" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="60" r="8" fill="#ffd700" filter="url(#gate_glow)">
    <animate attributeName="fill" values="#ffd700;#ff6600;#ffd700" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Ancient runes on pillars -->
  <g fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.8">
    <path d="M12 40 L22 40 M17 35 L17 50"/>
    <path d="M12 70 L22 60 L22 80"/>
    <path d="M12 100 Q17 90 22 100 Q17 110 12 100"/>
    <path d="M98 40 L108 40 M103 35 L103 50"/>
    <path d="M98 70 L108 60 L108 80"/>
    <path d="M98 100 Q103 90 108 100 Q103 110 98 100"/>
  </g>
  <!-- Portal void inside gate -->
  <ellipse cx="60" cy="95" rx="25" ry="30" fill="#0a0015" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.7;0.9" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Swirling energy -->
  <path d="M45 95 Q60 80 75 95 Q60 110 45 95" fill="none" stroke="#9933ff" stroke-width="2" opacity="0.6">
    <animate attributeName="d" values="M45 95 Q60 80 75 95 Q60 110 45 95;M40 95 Q60 75 80 95 Q60 115 40 95;M45 95 Q60 80 75 95 Q60 110 45 95" dur="3s" repeatCount="indefinite"/>
  </path>
</svg>

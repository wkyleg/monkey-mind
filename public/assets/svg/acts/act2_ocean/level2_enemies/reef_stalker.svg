<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="reefGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Coral camouflage body - spiky irregular shape -->
  <polygon points="30,10 40,15 48,25 45,35 50,45 40,50 30,48 20,50 10,45 15,35 12,25 20,15" 
           fill="#cc5566" stroke="#ff7788" stroke-width="2"/>
  
  <!-- Coral texture bumps -->
  <circle cx="25" cy="20" r="3" fill="#dd6677"/>
  <circle cx="35" cy="22" r="4" fill="#dd6677"/>
  <circle cx="28" cy="35" r="3" fill="#dd6677"/>
  <circle cx="38" cy="38" r="2" fill="#dd6677"/>
  
  <!-- Hidden predator eyes -->
  <circle cx="24" cy="28" r="4" fill="#ffff00" filter="url(#reefGlow)"/>
  <circle cx="36" cy="28" r="4" fill="#ffff00" filter="url(#reefGlow)"/>
  <circle cx="24" cy="28" r="2" fill="#000000"/>
  <circle cx="36" cy="28" r="2" fill="#000000"/>
  
  <!-- Disguised fins as coral branches -->
  <polygon points="15,20 5,15 10,25" fill="#cc5566" stroke="#ff7788" stroke-width="1"/>
  <polygon points="45,20 55,15 50,25" fill="#cc5566" stroke="#ff7788" stroke-width="1"/>
</svg>

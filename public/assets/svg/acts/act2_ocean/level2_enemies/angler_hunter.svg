<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="anglerGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main body - bulbous angler fish -->
  <ellipse cx="30" cy="35" rx="16" ry="14" fill="#0a1a2a" stroke="#006699" stroke-width="2"/>
  
  <!-- Giant mouth with teeth -->
  <path d="M 15 35 Q 30 50 45 35" fill="#0a1a2a" stroke="#006699" stroke-width="2"/>
  <polygon points="18,37 20,43 22,37" fill="#ffffff"/>
  <polygon points="26,37 28,45 30,37" fill="#ffffff"/>
  <polygon points="34,37 36,45 38,37" fill="#ffffff"/>
  <polygon points="40,37 42,43 44,37" fill="#ffffff"/>
  
  <!-- Bioluminescent lure -->
  <line x1="30" y1="20" x2="30" y2="5" stroke="#006699" stroke-width="1"/>
  <circle cx="30" cy="5" r="5" fill="#ffff00" filter="url(#anglerGlow)"/>
  
  <!-- Small angry eye -->
  <circle cx="22" cy="28" r="4" fill="#ff6600"/>
  <circle cx="22" cy="28" r="2" fill="#000000"/>
</svg>

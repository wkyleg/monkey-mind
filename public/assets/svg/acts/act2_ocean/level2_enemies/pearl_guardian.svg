<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="pearlGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="pearlShine">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#aaccff;stop-opacity:1"/>
    </radialGradient>
  </defs>
  
  <!-- Oyster shell base -->
  <ellipse cx="30" cy="40" rx="22" ry="12" fill="#445566" stroke="#889999" stroke-width="2"/>
  <ellipse cx="30" cy="25" rx="22" ry="15" fill="#556677" stroke="#889999" stroke-width="2"/>
  
  <!-- Shell ridges -->
  <path d="M 10 25 Q 30 35 50 25" fill="none" stroke="#667788" stroke-width="1"/>
  <path d="M 12 30 Q 30 38 48 30" fill="none" stroke="#667788" stroke-width="1"/>
  
  <!-- Central pearl being guarded -->
  <circle cx="30" cy="32" r="8" fill="url(#pearlShine)" filter="url(#pearlGlow)"/>
  
  <!-- Protective tentacles -->
  <path d="M 15 35 Q 10 45 5 50" fill="none" stroke="#778899" stroke-width="2"/>
  <path d="M 45 35 Q 50 45 55 50" fill="none" stroke="#778899" stroke-width="2"/>
  
  <!-- Eyes peeking from shell -->
  <circle cx="20" cy="22" r="3" fill="#00ffaa"/>
  <circle cx="40" cy="22" r="3" fill="#00ffaa"/>
</svg>

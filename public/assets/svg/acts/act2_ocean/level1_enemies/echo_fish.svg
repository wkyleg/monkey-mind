<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="echoGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main body - fish shape -->
  <ellipse cx="30" cy="30" rx="18" ry="12" fill="#0a2a4a" stroke="#00ccff" stroke-width="2"/>
  
  <!-- Tail fin -->
  <polygon points="48,30 58,20 58,40" fill="#0a2a4a" stroke="#00ccff" stroke-width="1"/>
  
  <!-- Dorsal fin -->
  <polygon points="25,18 30,8 35,18" fill="#0a2a4a" stroke="#00ccff" stroke-width="1"/>
  
  <!-- Eye (sonar-like) -->
  <circle cx="20" cy="28" r="6" fill="#00ffff" filter="url(#echoGlow)"/>
  <circle cx="20" cy="28" r="3" fill="#0a1a2a"/>
  
  <!-- Sonar rings emanating -->
  <circle cx="20" cy="28" r="10" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.5"/>
  <circle cx="20" cy="28" r="15" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.3"/>
  <circle cx="20" cy="28" r="20" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.1"/>
</svg>

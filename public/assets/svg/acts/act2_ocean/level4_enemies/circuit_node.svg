<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="circuitGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circuit board base -->
  <rect x="10" y="10" width="40" height="40" fill="#0a2a3a" stroke="#00aacc" stroke-width="2"/>
  
  <!-- Circuit traces -->
  <line x1="10" y1="20" x2="20" y2="20" stroke="#00ccff" stroke-width="2"/>
  <line x1="20" y1="20" x2="20" y2="30" stroke="#00ccff" stroke-width="2"/>
  <line x1="40" y1="20" x2="50" y2="20" stroke="#00ccff" stroke-width="2"/>
  <line x1="40" y1="20" x2="40" y2="30" stroke="#00ccff" stroke-width="2"/>
  <line x1="10" y1="40" x2="25" y2="40" stroke="#00ccff" stroke-width="2"/>
  <line x1="35" y1="40" x2="50" y2="40" stroke="#00ccff" stroke-width="2"/>
  
  <!-- Central processing node -->
  <circle cx="30" cy="30" r="10" fill="#0a3a4a" stroke="#00ffff" stroke-width="2" filter="url(#circuitGlow)"/>
  
  <!-- Node core -->
  <circle cx="30" cy="30" r="5" fill="#00ffff" filter="url(#circuitGlow)"/>
  
  <!-- Connection points -->
  <circle cx="20" cy="30" r="3" fill="#00aacc"/>
  <circle cx="40" cy="30" r="3" fill="#00aacc"/>
  <circle cx="30" cy="20" r="3" fill="#00aacc"/>
  <circle cx="30" cy="40" r="3" fill="#00aacc"/>
  
  <!-- Status indicator -->
  <rect x="25" y="48" width="10" height="3" fill="#00ff00"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <radialGradient id="fishGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00ffaa"/>
      <stop offset="100%" style="stop-color:#008866;stop-opacity:0.5"/>
    </radialGradient>
  </defs>
  
  <!-- School of small bioluminescent fish -->
  <g transform="translate(30,30)">
    <!-- Fish 1 (center) -->
    <g transform="translate(0,0)">
      <ellipse cx="0" cy="0" rx="8" ry="4" fill="#00aa88"/>
      <polygon points="8,0 12,-3 12,3" fill="#00aa88"/>
      <circle cx="-4" cy="-1" r="1.5" fill="#00ffcc"/>
      <circle cx="0" cy="0" r="3" fill="url(#fishGlow)" opacity="0.6">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Fish 2 (top-left) -->
    <g transform="translate(-12,-8) rotate(-10)">
      <ellipse cx="0" cy="0" rx="6" ry="3" fill="#00bb99"/>
      <polygon points="6,0 9,-2 9,2" fill="#00bb99"/>
      <circle cx="-3" cy="-0.5" r="1" fill="#00ffcc"/>
      <circle cx="0" cy="0" r="2" fill="url(#fishGlow)" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
    </g>
    
    <!-- Fish 3 (top-right) -->
    <g transform="translate(10,-10) rotate(5)">
      <ellipse cx="0" cy="0" rx="7" ry="3.5" fill="#00aa77"/>
      <polygon points="7,0 10,-2.5 10,2.5" fill="#00aa77"/>
      <circle cx="-3.5" cy="-0.8" r="1.2" fill="#00ffcc"/>
      <circle cx="0" cy="0" r="2.5" fill="url(#fishGlow)" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="0.9s" repeatCount="indefinite" begin="0.4s"/>
      </circle>
    </g>
    
    <!-- Fish 4 (bottom-left) -->
    <g transform="translate(-10,10) rotate(15)">
      <ellipse cx="0" cy="0" rx="5" ry="2.5" fill="#00cc88"/>
      <polygon points="5,0 8,-2 8,2" fill="#00cc88"/>
      <circle cx="-2.5" cy="-0.5" r="0.8" fill="#00ffcc"/>
      <circle cx="0" cy="0" r="2" fill="url(#fishGlow)" opacity="0.4">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.1s" repeatCount="indefinite" begin="0.1s"/>
      </circle>
    </g>
    
    <!-- Fish 5 (bottom-right) -->
    <g transform="translate(12,8) rotate(-5)">
      <ellipse cx="0" cy="0" rx="6" ry="3" fill="#00bb77"/>
      <polygon points="6,0 9,-2 9,2" fill="#00bb77"/>
      <circle cx="-3" cy="-0.5" r="1" fill="#00ffcc"/>
      <circle cx="0" cy="0" r="2" fill="url(#fishGlow)" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.3s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
    </g>
    
    <!-- Sonar pulse effect -->
    <circle cx="0" cy="0" r="5" fill="none" stroke="#00ffaa" stroke-width="0.5" opacity="0">
      <animate attributeName="r" values="5;25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

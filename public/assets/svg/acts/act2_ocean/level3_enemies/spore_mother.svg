<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="sporeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main fungal body -->
  <ellipse cx="30" cy="35" rx="18" ry="15" fill="#2a3a2a" stroke="#55aa55" stroke-width="2"/>
  
  <!-- Mushroom cap top -->
  <ellipse cx="30" cy="20" rx="22" ry="10" fill="#3a4a3a" stroke="#66bb66" stroke-width="2"/>
  
  <!-- Spore release vents -->
  <circle cx="20" cy="18" r="3" fill="#88cc88" filter="url(#sporeGlow)"/>
  <circle cx="30" cy="15" r="3" fill="#88cc88" filter="url(#sporeGlow)"/>
  <circle cx="40" cy="18" r="3" fill="#88cc88" filter="url(#sporeGlow)"/>
  
  <!-- Floating spores -->
  <circle cx="15" cy="8" r="2" fill="#aaeeaa" opacity="0.7"/>
  <circle cx="35" cy="5" r="2" fill="#aaeeaa" opacity="0.7"/>
  <circle cx="50" cy="10" r="2" fill="#aaeeaa" opacity="0.7"/>
  <circle cx="10" cy="25" r="1.5" fill="#aaeeaa" opacity="0.5"/>
  <circle cx="55" cy="30" r="1.5" fill="#aaeeaa" opacity="0.5"/>
  
  <!-- Eyes (hive mind) -->
  <circle cx="25" cy="28" r="4" fill="#00ff66" filter="url(#sporeGlow)"/>
  <circle cx="35" cy="28" r="4" fill="#00ff66" filter="url(#sporeGlow)"/>
</svg>

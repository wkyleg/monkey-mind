<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <filter id="sporeGlowBg">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Floating spores -->
  <g fill="#88dd88" filter="url(#sporeGlowBg)">
    <circle cx="50" cy="100" r="3" opacity="0.6"/>
    <circle cx="150" cy="80" r="2" opacity="0.5"/>
    <circle cx="250" cy="150" r="3" opacity="0.6"/>
    <circle cx="350" cy="60" r="2" opacity="0.4"/>
    <circle cx="450" cy="120" r="3" opacity="0.5"/>
    <circle cx="550" cy="90" r="2" opacity="0.6"/>
    <circle cx="650" cy="140" r="3" opacity="0.5"/>
    <circle cx="750" cy="70" r="2" opacity="0.4"/>
    
    <circle cx="100" cy="250" r="2" opacity="0.5"/>
    <circle cx="200" cy="300" r="3" opacity="0.6"/>
    <circle cx="300" cy="220" r="2" opacity="0.4"/>
    <circle cx="400" cy="280" r="3" opacity="0.5"/>
    <circle cx="500" cy="240" r="2" opacity="0.6"/>
    <circle cx="600" cy="310" r="3" opacity="0.5"/>
    <circle cx="700" cy="260" r="2" opacity="0.4"/>
    
    <circle cx="80" cy="400" r="3" opacity="0.6"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Silhouettes of deep sea creatures -->
  <g fill="#003355" opacity="0.3">
    <!-- Jellyfish shapes -->
    <ellipse cx="150" cy="100" rx="30" ry="20"/>
    <path d="M 130 120 Q 125 180 140 200" stroke="#003355" stroke-width="2" fill="none"/>
    <path d="M 150 120 Q 145 190 160 210" stroke="#003355" stroke-width="2" fill="none"/>
    <path d="M 170 120 Q 165 180 180 200" stroke="#003355" stroke-width="2" fill="none"/>
    
    <ellipse cx="600" cy="200" rx="25" ry="15"/>
    <path d="M 580 215 Q 575 260 590 280" stroke="#003355" stroke-width="2" fill="none"/>
    <path d="M 600 215 Q 595 270 610 290" stroke="#003355" stroke-width="2" fill="none"/>
    <path d="M 620 215 Q 615 260 630 280" stroke="#003355" stroke-width="2" fill="none"/>
    
    <!-- Fish silhouettes -->
    <ellipse cx="300" cy="300" rx="40" ry="15"/>
    <polygon points="340,300 360,290 360,310"/>
    
    <ellipse cx="500" cy="400" rx="30" ry="12"/>
    <polygon points="530,400 545,392 545,408"/>
  </g>
</svg>

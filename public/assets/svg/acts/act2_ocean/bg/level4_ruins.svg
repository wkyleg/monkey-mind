<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Ruined structures -->
  <g fill="#223344" opacity="0.3">
    <!-- Broken walls -->
    <polygon points="50,600 50,400 80,380 80,450 100,430 100,600"/>
    <polygon points="180,600 180,480 210,460 220,520 240,500 240,600"/>
    <polygon points="320,600 320,420 350,400 360,480 380,450 380,600"/>
    <polygon points="500,600 500,440 530,420 540,500 560,470 560,600"/>
    <polygon points="620,600 620,400 650,380 660,460 680,430 680,600"/>
    <polygon points="720,600 720,460 750,440 760,520 780,490 780,600"/>
  </g>
  
  <!-- Fallen columns -->
  <g fill="#334455" opacity="0.25">
    <ellipse cx="150" cy="560" rx="60" ry="10" transform="rotate(-15 150 560)"/>
    <ellipse cx="450" cy="570" rx="70" ry="12" transform="rotate(10 450 570)"/>
    <ellipse cx="700" cy="555" rx="55" ry="10" transform="rotate(-8 700 555)"/>
  </g>
  
  <!-- Debris -->
  <g fill="#445566" opacity="0.2">
    <rect x="100" y="580" width="20" height="15" transform="rotate(20 110 588)"/>
    <rect x="280" y="575" width="15" height="20" transform="rotate(-10 288 585)"/>
    <rect x="400" y="585" width="25" height="12" transform="rotate(5 413 591)"/>
    <rect x="580" y="578" width="18" height="18" transform="rotate(-15 589 587)"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c4033"/>
      <stop offset="100%" style="stop-color:#3d2817"/>
    </linearGradient>
  </defs>
  
  <!-- Infinite library bookshelves -->
  <g opacity="0.4">
    <!-- Shelf rows -->
    <g fill="url(#woodGrad)">
      <rect x="0" y="80" width="400" height="8"/>
      <rect x="0" y="180" width="400" height="8"/>
      <rect x="0" y="280" width="400" height="8"/>
      <rect x="0" y="380" width="400" height="8"/>
      <rect x="0" y="480" width="400" height="8"/>
    </g>
    
    <!-- Books on shelves -->
    <g>
      <!-- Row 1 -->
      <rect x="10" y="55" width="15" height="25" fill="#8b0000"/>
      <rect x="28" y="50" width="12" height="30" fill="#00008b"/>
      <rect x="43" y="52" width="18" height="28" fill="#006400"/>
      <rect x="65" y="48" width="10" height="32" fill="#4b0082"/>
      <rect x="80" y="55" width="20" height="25" fill="#8b4513"/>
      <rect x="105" y="50" width="14" height="30" fill="#2f4f4f"/>
      <rect x="125" y="52" width="16" height="28" fill="#800000"/>
      <rect x="145" y="48" width="12" height="32" fill="#191970"/>
      <rect x="162" y="54" width="18" height="26" fill="#556b2f"/>
      <rect x="185" y="50" width="15" height="30" fill="#8b008b"/>
      
      <!-- More rows with similar patterns offset -->
      <rect x="220" y="55" width="12" height="25" fill="#8b0000"/>
      <rect x="236" y="48" width="16" height="32" fill="#00008b"/>
      <rect x="256" y="52" width="14" height="28" fill="#006400"/>
      <rect x="275" y="50" width="20" height="30" fill="#4b0082"/>
      <rect x="300" y="54" width="10" height="26" fill="#8b4513"/>
      <rect x="315" y="48" width="18" height="32" fill="#2f4f4f"/>
      <rect x="338" y="52" width="12" height="28" fill="#800000"/>
      <rect x="355" y="50" width="16" height="30" fill="#191970"/>
      <rect x="376" y="55" width="14" height="25" fill="#556b2f"/>
    </g>
    
    <!-- Repeat for other rows (simplified) -->
    <g transform="translate(0,100)">
      <rect x="5" y="55" width="18" height="25" fill="#4b0082"/>
      <rect x="28" y="48" width="14" height="32" fill="#8b0000"/>
      <rect x="47" y="52" width="16" height="28" fill="#191970"/>
      <rect x="68" y="50" width="12" height="30" fill="#006400"/>
      <rect x="85" y="54" width="20" height="26" fill="#8b4513"/>
      <rect x="200" y="48" width="15" height="32" fill="#800000"/>
      <rect x="220" y="52" width="18" height="28" fill="#00008b"/>
      <rect x="243" y="55" width="10" height="25" fill="#2f4f4f"/>
      <rect x="320" y="50" width="16" height="30" fill="#8b008b"/>
      <rect x="341" y="48" width="14" height="32" fill="#556b2f"/>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Escher-like impossible geometry -->
  <g stroke="#8855ff" stroke-width="2" fill="none" opacity="0.3">
    <!-- Impossible triangle -->
    <g transform="translate(200,150)">
      <path d="M0,-60 L52,30 L-52,30 Z"/>
      <path d="M0,-40 L35,20 L-35,20 Z"/>
      <!-- Impossible connection -->
      <line x1="-52" y1="30" x2="-35" y2="20"/>
      <line x1="52" y1="30" x2="35" y2="20"/>
      <line x1="0" y1="-60" x2="0" y2="-40"/>
    </g>
    
    <!-- Impossible stairs -->
    <g transform="translate(100,350)">
      <path d="M0,0 L30,0 L30,-20 L60,-20 L60,-40 L90,-40 L90,0 L60,0 L60,20 L30,20 L30,40 L0,40 Z"/>
    </g>
    
    <!-- Möbius-like loop -->
    <g transform="translate(300,400)">
      <ellipse cx="0" cy="0" rx="40" ry="20"/>
      <path d="M-40,0 Q-40,-30 0,-30 Q40,-30 40,0"/>
      <path d="M-40,0 Q-40,30 0,30 Q40,30 40,0" stroke-dasharray="5,5"/>
    </g>
    
    <!-- Infinity symbol -->
    <g transform="translate(200,500)">
      <path d="M-40,0 Q-40,-25 -20,-25 Q0,-25 0,0 Q0,25 20,25 Q40,25 40,0 Q40,-25 20,-25 Q0,-25 0,0 Q0,25 -20,25 Q-40,25 -40,0"/>
    </g>
    
    <!-- Nested squares (infinite regress) -->
    <g transform="translate(320,200)">
      <rect x="-40" y="-40" width="80" height="80"/>
      <rect x="-30" y="-30" width="60" height="60" transform="rotate(15)"/>
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(30)"/>
      <rect x="-10" y="-10" width="20" height="20" transform="rotate(45)"/>
    </g>
  </g>
</svg>

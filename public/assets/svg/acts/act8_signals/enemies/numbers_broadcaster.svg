<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="radioStatic">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay"/>
    </filter>
  </defs>
  
  <!-- Old radio body -->
  <rect x="12" y="20" width="40" height="35" fill="#2a2a2a" rx="3" stroke="#444444" stroke-width="1"/>
  
  <!-- Speaker grille -->
  <g stroke="#555555" stroke-width="1">
    <line x1="16" y1="28" x2="48" y2="28"/>
    <line x1="16" y1="32" x2="48" y2="32"/>
    <line x1="16" y1="36" x2="48" y2="36"/>
    <line x1="16" y1="40" x2="48" y2="40"/>
  </g>
  
  <!-- Tuning dial -->
  <circle cx="32" cy="48" r="4" fill="#1a1a1a" stroke="#666666" stroke-width="1"/>
  <line x1="32" y1="44" x2="32" y2="46" stroke="#00ff00" stroke-width="1"/>
  
  <!-- Frequency display -->
  <rect x="18" y="12" width="28" height="8" fill="#0a0a0a" stroke="#333333" stroke-width="0.5"/>
  <text x="32" y="18" text-anchor="middle" font-family="monospace" font-size="5" fill="#00ff00">
    4625 kHz
  </text>
  
  <!-- Antenna -->
  <line x1="32" y1="12" x2="32" y2="2" stroke="#666666" stroke-width="2"/>
  <circle cx="32" cy="2" r="2" fill="#ff0000">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Numbers floating around -->
  <g font-family="monospace" font-size="4" fill="#00ff00" opacity="0.6" filter="url(#radioStatic)">
    <text x="8" y="15">7</text>
    <text x="52" y="25">3</text>
    <text x="5" y="45">9</text>
    <text x="55" y="50">1</text>
    <text x="10" y="58">4</text>
    <text x="50" y="10">8</text>
  </g>
  
  <!-- Sound waves -->
  <g stroke="#00ff00" fill="none" stroke-width="0.5" opacity="0.3">
    <path d="M48,34 Q52,30 48,26"/>
    <path d="M52,36 Q58,30 52,24"/>
  </g>
</svg>

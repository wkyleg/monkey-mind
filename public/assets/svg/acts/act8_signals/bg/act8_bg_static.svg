<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="staticGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <!-- Base void -->
  <rect width="400" height="600" fill="url(#staticGrad)"/>
  
  <!-- TV static noise -->
  <rect width="400" height="600" filter="url(#noise)" opacity="0.3"/>
  
  <!-- Scan lines -->
  <g stroke="#333" stroke-width="1" opacity="0.2">
    <line x1="0" y1="0" x2="400" y2="0"/>
    <line x1="0" y1="4" x2="400" y2="4"/>
    <line x1="0" y1="8" x2="400" y2="8"/>
    <line x1="0" y1="12" x2="400" y2="12"/>
    <line x1="0" y1="16" x2="400" y2="16"/>
    <line x1="0" y1="20" x2="400" y2="20"/>
    <line x1="0" y1="24" x2="400" y2="24"/>
    <line x1="0" y1="28" x2="400" y2="28"/>
    <line x1="0" y1="32" x2="400" y2="32"/>
  </g>
  
  <!-- Glitch bars -->
  <rect x="0" y="150" width="400" height="3" fill="#00ff00" opacity="0.1"/>
  <rect x="0" y="300" width="400" height="2" fill="#ff0000" opacity="0.1"/>
  <rect x="0" y="450" width="400" height="4" fill="#0000ff" opacity="0.1"/>
  
  <!-- Signal interference patterns -->
  <g opacity="0.15">
    <path d="M0,100 Q100,80 200,100 T400,100" stroke="#00ff00" fill="none" stroke-width="1"/>
    <path d="M0,200 Q100,220 200,200 T400,200" stroke="#ff0000" fill="none" stroke-width="1"/>
    <path d="M0,400 Q100,380 200,400 T400,400" stroke="#ffffff" fill="none" stroke-width="1"/>
  </g>
</svg>

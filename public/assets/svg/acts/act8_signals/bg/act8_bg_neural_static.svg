<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <filter id="neuralBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <linearGradient id="neuralFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="400" height="600" fill="url(#neuralFade)"/>
  
  <!-- Neural network pattern - the quiet mind's structure -->
  <g stroke="#333333" fill="none" stroke-width="0.5" opacity="0.3">
    <!-- Central node -->
    <circle cx="200" cy="300" r="20"/>
    
    <!-- Inner ring nodes -->
    <circle cx="150" cy="250" r="8"/>
    <circle cx="250" cy="250" r="8"/>
    <circle cx="150" cy="350" r="8"/>
    <circle cx="250" cy="350" r="8"/>
    
    <!-- Connections to center -->
    <line x1="200" y1="300" x2="150" y2="250"/>
    <line x1="200" y1="300" x2="250" y2="250"/>
    <line x1="200" y1="300" x2="150" y2="350"/>
    <line x1="200" y1="300" x2="250" y2="350"/>
    
    <!-- Outer ring nodes -->
    <circle cx="100" cy="200" r="5"/>
    <circle cx="200" cy="150" r="5"/>
    <circle cx="300" cy="200" r="5"/>
    <circle cx="100" cy="400" r="5"/>
    <circle cx="200" cy="450" r="5"/>
    <circle cx="300" cy="400" r="5"/>
    
    <!-- Outer connections -->
    <line x1="150" y1="250" x2="100" y2="200"/>
    <line x1="150" y1="250" x2="200" y2="150"/>
    <line x1="250" y1="250" x2="200" y2="150"/>
    <line x1="250" y1="250" x2="300" y2="200"/>
    <line x1="150" y1="350" x2="100" y2="400"/>
    <line x1="150" y1="350" x2="200" y2="450"/>
    <line x1="250" y1="350" x2="200" y2="450"/>
    <line x1="250" y1="350" x2="300" y2="400"/>
  </g>
  
  <!-- Pulsing activity - very subtle -->
  <g fill="#ffffff" opacity="0.1" filter="url(#neuralBlur)">
    <circle cx="200" cy="300" r="3">
      <animate attributeName="r" values="3;8;3" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Static interference -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.2">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="400" x2="400" y2="400"/>
    <line x1="0" y1="500" x2="400" y2="500"/>
  </g>
</svg>

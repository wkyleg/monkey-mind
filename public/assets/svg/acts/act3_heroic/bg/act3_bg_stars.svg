<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="starGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffcc00"/>
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Constellation patterns representing Greek myths -->
  <g fill="#ffcc00" opacity="0.6">
    <!-- Orion-like constellation -->
    <circle cx="80" cy="100" r="2"/>
    <circle cx="100" cy="80" r="2.5"/>
    <circle cx="120" cy="100" r="2"/>
    <circle cx="85" cy="130" r="1.5"/>
    <circle cx="100" cy="150" r="3"/>
    <circle cx="115" cy="130" r="1.5"/>
    <circle cx="70" cy="170" r="2"/>
    <circle cx="130" cy="170" r="2"/>
    
    <!-- Connect with faint lines -->
    <g stroke="#ffcc00" stroke-width="0.5" opacity="0.3">
      <line x1="80" y1="100" x2="100" y2="80"/>
      <line x1="100" y1="80" x2="120" y2="100"/>
      <line x1="85" y1="130" x2="100" y2="150"/>
      <line x1="100" y1="150" x2="115" y2="130"/>
      <line x1="85" y1="130" x2="70" y2="170"/>
      <line x1="115" y1="130" x2="130" y2="170"/>
    </g>
    
    <!-- Scattered stars -->
    <circle cx="250" cy="50" r="1.5"/>
    <circle cx="300" cy="120" r="2"/>
    <circle cx="350" cy="80" r="1"/>
    <circle cx="180" cy="200" r="2.5"/>
    <circle cx="320" cy="250" r="1.5"/>
    <circle cx="50" cy="300" r="2"/>
    <circle cx="370" cy="350" r="1.5"/>
    <circle cx="150" cy="400" r="2"/>
    <circle cx="280" cy="450" r="1"/>
    <circle cx="100" cy="500" r="2.5"/>
    <circle cx="350" cy="520" r="1.5"/>
    
    <!-- Twinkling effect on some stars -->
    <circle cx="200" cy="300" r="2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="450" r="2.5">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="200" r="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

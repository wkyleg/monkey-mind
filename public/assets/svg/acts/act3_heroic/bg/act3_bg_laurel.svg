<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="laurelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#d4af37"/>
    </linearGradient>
  </defs>
  
  <!-- Decorative laurel wreaths and Greek key patterns -->
  <g opacity="0.3">
    <!-- Top laurel wreath arc -->
    <g transform="translate(200,80)" fill="url(#laurelGrad)">
      <!-- Left branch -->
      <g transform="rotate(-30)">
        <ellipse cx="-40" cy="0" rx="12" ry="5" transform="rotate(-20)"/>
        <ellipse cx="-60" cy="5" rx="12" ry="5" transform="rotate(-10)"/>
        <ellipse cx="-80" cy="15" rx="12" ry="5" transform="rotate(0)"/>
        <ellipse cx="-95" cy="30" rx="12" ry="5" transform="rotate(10)"/>
      </g>
      <!-- Right branch -->
      <g transform="rotate(30)">
        <ellipse cx="40" cy="0" rx="12" ry="5" transform="rotate(20)"/>
        <ellipse cx="60" cy="5" rx="12" ry="5" transform="rotate(10)"/>
        <ellipse cx="80" cy="15" rx="12" ry="5" transform="rotate(0)"/>
        <ellipse cx="95" cy="30" rx="12" ry="5" transform="rotate(-10)"/>
      </g>
    </g>
    
    <!-- Greek key pattern (meander) at bottom -->
    <g stroke="url(#laurelGrad)" stroke-width="2" fill="none" transform="translate(0,550)">
      <path d="M0,0 L20,0 L20,15 L10,15 L10,5 L0,5"/>
      <path d="M40,0 L60,0 L60,15 L50,15 L50,5 L40,5"/>
      <path d="M80,0 L100,0 L100,15 L90,15 L90,5 L80,5"/>
      <path d="M120,0 L140,0 L140,15 L130,15 L130,5 L120,5"/>
      <path d="M160,0 L180,0 L180,15 L170,15 L170,5 L160,5"/>
      <path d="M200,0 L220,0 L220,15 L210,15 L210,5 L200,5"/>
      <path d="M240,0 L260,0 L260,15 L250,15 L250,5 L240,5"/>
      <path d="M280,0 L300,0 L300,15 L290,15 L290,5 L280,5"/>
      <path d="M320,0 L340,0 L340,15 L330,15 L330,5 L320,5"/>
      <path d="M360,0 L380,0 L380,15 L370,15 L370,5 L360,5"/>
    </g>
    
    <!-- Side decorations -->
    <g fill="url(#laurelGrad)">
      <!-- Left side leaves -->
      <ellipse cx="20" cy="200" rx="8" ry="15" transform="rotate(30 20 200)"/>
      <ellipse cx="15" cy="250" rx="8" ry="15" transform="rotate(25 15 250)"/>
      <ellipse cx="20" cy="300" rx="8" ry="15" transform="rotate(35 20 300)"/>
      <ellipse cx="15" cy="350" rx="8" ry="15" transform="rotate(20 15 350)"/>
      
      <!-- Right side leaves -->
      <ellipse cx="380" cy="200" rx="8" ry="15" transform="rotate(-30 380 200)"/>
      <ellipse cx="385" cy="250" rx="8" ry="15" transform="rotate(-25 385 250)"/>
      <ellipse cx="380" cy="300" rx="8" ry="15" transform="rotate(-35 380 300)"/>
      <ellipse cx="385" cy="350" rx="8" ry="15" transform="rotate(-20 385 350)"/>
    </g>
  </g>
</svg>

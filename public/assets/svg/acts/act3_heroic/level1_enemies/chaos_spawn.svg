<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="chaosGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="voidGrad">
      <stop offset="0%" style="stop-color:#1a0a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1"/>
    </radialGradient>
  </defs>
  <circle cx="30" cy="30" r="22" fill="url(#voidGrad)" stroke="#660066" stroke-width="2"/>
  <circle cx="30" cy="30" r="15" fill="none" stroke="#aa00aa" stroke-width="1" opacity="0.5"/>
  <circle cx="30" cy="30" r="8" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.7"/>
  <circle cx="30" cy="30" r="3" fill="#ff00ff" filter="url(#chaosGlow)"/>
  <circle cx="20" cy="25" r="2" fill="#aa00aa" opacity="0.6"/>
  <circle cx="40" cy="35" r="2" fill="#aa00aa" opacity="0.6"/>
  <circle cx="25" cy="40" r="1.5" fill="#aa00aa" opacity="0.4"/>
</svg>

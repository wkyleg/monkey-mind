<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="bronzeShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#b8860b"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#7a6012"/>
    </linearGradient>
  </defs>
  
  <!-- Greek hoplite warrior -->
  <g transform="translate(30,30)">
    <!-- Shield (hoplon) -->
    <circle cx="0" cy="5" r="18" fill="url(#bronzeShield)" stroke="#6b4c0a" stroke-width="2"/>
    <!-- Shield boss (center) -->
    <circle cx="0" cy="5" r="6" fill="#8b6914" stroke="#5a3d08" stroke-width="1"/>
    <!-- Shield decoration -->
    <circle cx="0" cy="5" r="12" fill="none" stroke="#5a3d08" stroke-width="1"/>
    
    <!-- Corinthian helmet -->
    <g transform="translate(0,-18)">
      <ellipse cx="0" cy="0" rx="10" ry="8" fill="url(#helmetGrad)"/>
      <!-- Helmet crest -->
      <path d="M-2,-8 Q0,-15 2,-8" fill="#cc0000" stroke="#880000" stroke-width="1"/>
      <path d="M-1,-8 L-1,-12 Q0,-14 1,-12 L1,-8" fill="#ff2200"/>
      <!-- Eye slits -->
      <rect x="-7" y="-2" width="4" height="2" fill="#111"/>
      <rect x="3" y="-2" width="4" height="2" fill="#111"/>
      <!-- Nose guard -->
      <rect x="-1" y="-4" width="2" height="6" fill="#9a7b19"/>
    </g>
    
    <!-- Spear point visible above shield -->
    <polygon points="15,-20 18,-30 21,-20" fill="#aaaaaa" stroke="#888888" stroke-width="1"/>
    <rect x="17" y="-20" width="2" height="15" fill="#553311"/>
  </g>
</svg>

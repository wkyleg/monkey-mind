<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="threadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
  </defs>
  
  <!-- Fate spinner (Moirai-inspired) -->
  <g transform="translate(30,30)">
    <!-- Spinning wheel/distaff -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#8b4513" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Spokes -->
    <g stroke="#8b4513" stroke-width="2">
      <line x1="0" y1="-15" x2="0" y2="15"/>
      <line x1="-15" y1="0" x2="15" y2="0"/>
      <line x1="-10.6" y1="-10.6" x2="10.6" y2="10.6"/>
      <line x1="-10.6" y1="10.6" x2="10.6" y2="-10.6"/>
    </g>
    
    <!-- Center hub -->
    <circle cx="0" cy="0" r="5" fill="#d4af37"/>
    <circle cx="0" cy="0" r="3" fill="#aa8800"/>
    
    <!-- Thread of fate -->
    <path d="M5,0 Q20,-10 25,5 Q30,15 25,25" stroke="url(#threadGrad)" stroke-width="2" fill="none">
      <animate attributeName="d" values="M5,0 Q20,-10 25,5 Q30,15 25,25;M5,0 Q20,0 25,10 Q30,20 25,30;M5,0 Q20,-10 25,5 Q30,15 25,25" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Mysterious figure silhouette -->
    <g opacity="0.7">
      <!-- Hooded head -->
      <path d="M-8,-25 Q0,-35 8,-25 L6,-18 Q0,-22 -6,-18 Z" fill="#2a1a3a"/>
      <!-- Face shadow -->
      <ellipse cx="0" cy="-22" rx="4" ry="3" fill="#1a0a2a"/>
      <!-- Eyes (glowing) -->
      <circle cx="-2" cy="-23" r="1" fill="#d4af37">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="2" cy="-23" r="1" fill="#d4af37">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
    </g>
  </g>
</svg>

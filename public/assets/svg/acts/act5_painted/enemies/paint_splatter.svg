<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Animated paint splatter swarm -->
  <g transform="translate(30,30)">
    <!-- Main splatter -->
    <circle cx="0" cy="0" r="12" fill="#ff4500">
      <animate attributeName="r" values="12;14;12" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Splatter extensions -->
    <g fill="#ff4500">
      <ellipse cx="-15" cy="-5" rx="8" ry="5" transform="rotate(-30 -15 -5)"/>
      <ellipse cx="12" cy="-10" rx="7" ry="4" transform="rotate(45 12 -10)"/>
      <ellipse cx="10" cy="12" rx="6" ry="4" transform="rotate(-20 10 12)"/>
      <ellipse cx="-8" cy="15" rx="8" ry="4" transform="rotate(10 -8 15)"/>
      <circle cx="-18" cy="5" r="4"/>
      <circle cx="18" cy="2" r="3"/>
    </g>
    
    <!-- Drips -->
    <g fill="#ff4500">
      <ellipse cx="-5" cy="20" rx="3" ry="6"/>
      <ellipse cx="8" cy="18" rx="2" ry="5"/>
    </g>
    
    <!-- Eyes (emerging from paint) -->
    <g>
      <circle cx="-4" cy="-2" r="4" fill="#fff"/>
      <circle cx="4" cy="-2" r="4" fill="#fff"/>
      <circle cx="-4" cy="-2" r="2" fill="#000"/>
      <circle cx="4" cy="-2" r="2" fill="#000"/>
    </g>
  </g>
</svg>

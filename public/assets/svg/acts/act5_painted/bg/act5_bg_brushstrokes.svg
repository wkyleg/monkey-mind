<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <!-- Expressionist brushstrokes -->
  <g opacity="0.3">
    <!-- Horizontal strokes -->
    <path d="M0,100 Q100,90 200,110 Q300,95 400,105" stroke="#ff4500" stroke-width="20" fill="none" stroke-linecap="round"/>
    <path d="M0,250 Q150,260 250,240 Q350,255 400,245" stroke="#4169e1" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M0,400 Q80,410 160,395 Q280,405 400,390" stroke="#32cd32" stroke-width="25" fill="none" stroke-linecap="round"/>
    
    <!-- Diagonal strokes -->
    <path d="M0,0 Q50,100 100,50 Q150,150 200,100" stroke="#ffd700" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M300,200 Q350,300 400,250" stroke="#ff69b4" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M50,500 Q150,550 250,520 Q350,560 400,540" stroke="#9370db" stroke-width="14" fill="none" stroke-linecap="round"/>
    
    <!-- Vertical strokes -->
    <path d="M80,300 Q90,400 75,500" stroke="#ff6347" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M320,100 Q310,200 330,300 Q315,350 325,400" stroke="#00ced1" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>
</svg>

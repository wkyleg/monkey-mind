<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <pattern id="canvasTexture" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#2a1a0a"/>
      <rect x="0" y="0" width="2" height="2" fill="#2f1f0f" opacity="0.3"/>
      <rect x="2" y="2" width="2" height="2" fill="#251509" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Canvas texture background -->
  <rect width="400" height="600" fill="url(#canvasTexture)"/>
  
  <!-- Paint drips and splatters -->
  <g opacity="0.3">
    <!-- Red drip -->
    <path d="M50,0 Q55,100 45,200 Q50,250 48,300" stroke="#8b0000" stroke-width="8" fill="none"/>
    <!-- Blue drip -->
    <path d="M150,0 Q145,150 155,300 Q148,400 152,500" stroke="#00008b" stroke-width="6" fill="none"/>
    <!-- Yellow drip -->
    <path d="M280,0 Q290,80 275,160 Q285,240 278,320" stroke="#daa520" stroke-width="10" fill="none"/>
    <!-- Green drip -->
    <path d="M350,100 Q340,200 355,350" stroke="#006400" stroke-width="5" fill="none"/>
  </g>
  
  <!-- Paint splatters -->
  <g opacity="0.25">
    <circle cx="80" cy="400" r="25" fill="#8b0000"/>
    <circle cx="200" cy="150" r="30" fill="#00008b"/>
    <circle cx="320" cy="450" r="20" fill="#daa520"/>
    <ellipse cx="120" cy="550" rx="35" ry="20" fill="#006400"/>
  </g>
</svg>

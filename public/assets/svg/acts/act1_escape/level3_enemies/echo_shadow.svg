<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="echoGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="echoFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3355aa;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#3355aa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#3355aa;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Echo layers (fading copies) -->
  <ellipse cx="20" cy="30" rx="10" ry="18" fill="#3355aa" opacity="0.1"/>
  <ellipse cx="25" cy="30" rx="10" ry="18" fill="#3355aa" opacity="0.2"/>
  <ellipse cx="30" cy="30" rx="10" ry="18" fill="#3355aa" opacity="0.3"/>
  <ellipse cx="35" cy="30" rx="10" ry="18" fill="#3355aa" opacity="0.4"/>
  <ellipse cx="40" cy="30" rx="10" ry="18" fill="#3355aa" opacity="0.5"/>
  
  <!-- Main figure -->
  <ellipse cx="40" cy="30" rx="10" ry="18" fill="#1a2040" stroke="#3355aa" stroke-width="2"/>
  
  <!-- Single eye -->
  <circle cx="40" cy="25" r="4" fill="#3355aa" filter="url(#echoGlow)"/>
  <circle cx="40" cy="25" r="1.5" fill="#0a1020"/>
  
  <!-- Motion lines -->
  <g stroke="#3355aa" stroke-width="1" opacity="0.3">
    <line x1="5" y1="25" x2="15" y2="25"/>
    <line x1="5" y1="30" x2="18" y2="30"/>
    <line x1="5" y1="35" x2="15" y2="35"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="pipeGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Segmented body -->
  <g fill="#2a3040" stroke="#4a5060" stroke-width="1.5">
    <ellipse cx="30" cy="15" rx="10" ry="8"/>
    <ellipse cx="30" cy="25" rx="12" ry="8"/>
    <ellipse cx="30" cy="35" rx="12" ry="8"/>
    <ellipse cx="30" cy="45" rx="10" ry="8"/>
  </g>
  
  <!-- Legs/appendages -->
  <g stroke="#607080" stroke-width="2" fill="none">
    <line x1="18" y1="25" x2="8" y2="20"/>
    <line x1="42" y1="25" x2="52" y2="20"/>
    <line x1="18" y1="35" x2="5" y2="38"/>
    <line x1="42" y1="35" x2="55" y2="38"/>
    <line x1="20" y1="45" x2="10" y2="52"/>
    <line x1="40" y1="45" x2="50" y2="52"/>
  </g>
  
  <!-- Eyes -->
  <g filter="url(#pipeGlow)">
    <circle cx="25" cy="12" r="3" fill="#88ff88"/>
    <circle cx="35" cy="12" r="3" fill="#88ff88"/>
  </g>
  <circle cx="25" cy="12" r="1" fill="#0a1a0a"/>
  <circle cx="35" cy="12" r="1" fill="#0a1a0a"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="corridorPerspective" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="800" height="600" fill="url(#corridorPerspective)"/>
  
  <!-- Perspective corridor lines -->
  <g stroke="#00ccff" stroke-width="1" opacity="0.3">
    <!-- Left wall lines -->
    <line x1="0" y1="0" x2="200" y2="300"/>
    <line x1="0" y1="600" x2="200" y2="300"/>
    <!-- Right wall lines -->
    <line x1="800" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="600" x2="600" y2="300"/>
    <!-- Floor lines -->
    <line x1="0" y1="450" x2="200" y2="350"/>
    <line x1="800" y1="450" x2="600" y2="350"/>
  </g>
  
  <!-- Door frames along corridor -->
  <g stroke="#4a5568" stroke-width="2" fill="none" opacity="0.5">
    <rect x="50" y="100" width="80" height="160"/>
    <rect x="50" y="340" width="80" height="160"/>
    <rect x="670" y="100" width="80" height="160"/>
    <rect x="670" y="340" width="80" height="160"/>
  </g>
  
  <!-- Flickering lights -->
  <g fill="#ffcc00" opacity="0.2">
    <ellipse cx="200" cy="50" rx="60" ry="20"/>
    <ellipse cx="400" cy="30" rx="60" ry="20"/>
    <ellipse cx="600" cy="50" rx="60" ry="20"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4400;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ff8800;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Dark base -->
  <rect width="800" height="600" fill="#0a0505"/>
  
  <!-- Flame shapes from bottom -->
  <g fill="url(#flameGrad)">
    <path d="M 50 600 Q 60 500 100 450 Q 80 400 120 350 Q 100 300 140 250 L 180 350 Q 160 400 200 450 Q 170 500 190 550 L 50 600"/>
    <path d="M 200 600 Q 220 520 250 480 Q 230 420 270 370 Q 250 320 290 280 L 330 380 Q 300 430 340 480 Q 310 530 340 580 L 200 600"/>
    <path d="M 380 600 Q 400 510 430 460 Q 410 400 450 350 Q 430 290 470 240 L 520 350 Q 490 410 530 470 Q 500 530 530 580 L 380 600"/>
    <path d="M 550 600 Q 570 530 600 490 Q 580 430 620 380 Q 600 320 640 270 L 680 370 Q 650 430 690 490 Q 660 540 690 590 L 550 600"/>
    <path d="M 700 600 Q 710 520 740 470 Q 720 410 760 360 Q 740 300 780 250 L 800 350 Q 770 420 800 480 L 800 600 L 700 600"/>
  </g>
  
  <!-- Smoke wisps -->
  <g stroke="#666666" stroke-width="1" fill="none" opacity="0.2">
    <path d="M 100 250 Q 120 200 100 150 Q 130 100 110 50"/>
    <path d="M 300 220 Q 320 170 300 120 Q 330 70 310 20"/>
    <path d="M 500 200 Q 520 150 500 100 Q 530 50 510 0"/>
    <path d="M 700 230 Q 720 180 700 130 Q 730 80 710 30"/>
  </g>
</svg>

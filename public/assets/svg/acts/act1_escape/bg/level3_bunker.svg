<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <pattern id="concreteTexture" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <circle cx="1" cy="1" r="0.5" fill="#222"/>
      <circle cx="3" cy="3" r="0.3" fill="#181818"/>
    </pattern>
  </defs>
  
  <!-- Base concrete -->
  <rect width="800" height="600" fill="url(#concreteTexture)"/>
  
  <!-- Underground pipes -->
  <g stroke="#3d4a5c" stroke-width="12" fill="none" opacity="0.6">
    <path d="M 0 100 L 200 100 L 200 300 L 400 300"/>
    <path d="M 800 150 L 600 150 L 600 400 L 500 400"/>
    <path d="M 100 600 L 100 450 L 300 450"/>
  </g>
  
  <!-- Pipe joints -->
  <g fill="#4a5568">
    <circle cx="200" cy="100" r="15"/>
    <circle cx="200" cy="300" r="15"/>
    <circle cx="600" cy="150" r="15"/>
    <circle cx="600" cy="400" r="15"/>
    <circle cx="100" cy="450" r="15"/>
  </g>
  
  <!-- Dripping water effect -->
  <g fill="#0077aa" opacity="0.4">
    <ellipse cx="200" cy="320" rx="10" ry="3"/>
    <ellipse cx="200" cy="340" rx="8" ry="2"/>
    <ellipse cx="600" cy="420" rx="10" ry="3"/>
  </g>
  
  <!-- Rust stains -->
  <g fill="#8b4513" opacity="0.2">
    <ellipse cx="205" cy="200" rx="15" ry="40"/>
    <ellipse cx="595" cy="280" rx="12" ry="50"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="doorLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#00ffaa;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Base -->
  <rect width="800" height="600" fill="#0a0a1a"/>
  
  <!-- Exit door frame -->
  <rect x="300" y="100" width="200" height="400" fill="none" stroke="#00ffaa" stroke-width="4" opacity="0.5"/>
  
  <!-- Door glow -->
  <rect x="300" y="100" width="200" height="400" fill="url(#doorLight)"/>
  
  <!-- EXIT sign -->
  <rect x="350" y="60" width="100" height="30" fill="#00ffaa" opacity="0.2"/>
  <text x="400" y="82" fill="#00ffaa" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">EXIT</text>
  
  <!-- Door handle -->
  <circle cx="470" cy="300" r="10" fill="none" stroke="#00ffaa" stroke-width="2" opacity="0.6"/>
  
  <!-- Arrow pointing to door -->
  <path d="M 150 300 L 280 300 M 260 280 L 280 300 L 260 320" fill="none" stroke="#00ffaa" stroke-width="2" opacity="0.4"/>
  <path d="M 520 300 L 650 300 M 530 280 L 520 300 L 530 320" fill="none" stroke="#00ffaa" stroke-width="2" opacity="0.4" transform="rotate(180 585 300)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="mindVoid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Base -->
  <rect width="800" height="600" fill="url(#mindVoid)"/>
  
  <!-- Brain-like swirls -->
  <g stroke="#ff00aa" stroke-width="2" fill="none" opacity="0.3">
    <path d="M 200 200 Q 250 150 300 200 Q 350 250 300 300 Q 250 350 200 300 Q 150 250 200 200"/>
    <path d="M 500 200 Q 550 150 600 200 Q 650 250 600 300 Q 550 350 500 300 Q 450 250 500 200"/>
    <path d="M 350 400 Q 400 350 450 400 Q 500 450 450 500 Q 400 550 350 500 Q 300 450 350 400"/>
  </g>
  
  <!-- Neural connections -->
  <g stroke="#00ffaa" stroke-width="1" opacity="0.4">
    <line x1="250" y1="250" x2="550" y2="250"/>
    <line x1="400" y1="150" x2="400" y2="450"/>
    <line x1="200" y1="350" x2="600" y2="350"/>
    <line x1="300" y1="150" x2="500" y2="450"/>
    <line x1="500" y1="150" x2="300" y2="450"/>
  </g>
  
  <!-- Pulsing center -->
  <circle cx="400" cy="300" r="30" fill="#ff00aa" opacity="0.2"/>
  <circle cx="400" cy="300" r="50" fill="none" stroke="#ff00aa" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="300" r="80" fill="none" stroke="#ff00aa" stroke-width="1" opacity="0.2"/>
</svg>

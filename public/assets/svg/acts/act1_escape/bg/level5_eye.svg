<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#ff00aa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Base -->
  <rect width="800" height="600" fill="#030308"/>
  
  <!-- Large watching eye -->
  <ellipse cx="400" cy="300" rx="200" ry="120" fill="none" stroke="#ff00aa" stroke-width="3" opacity="0.5"/>
  <ellipse cx="400" cy="300" rx="150" ry="90" fill="#1a0a1a" stroke="#aa0066" stroke-width="2"/>
  
  <!-- Iris -->
  <circle cx="400" cy="300" r="60" fill="#220033" stroke="#ff00aa" stroke-width="2"/>
  
  <!-- Pupil -->
  <circle cx="400" cy="300" r="25" fill="#000000"/>
  <circle cx="400" cy="300" r="8" fill="url(#eyeGlow)"/>
  
  <!-- Reflection -->
  <circle cx="385" cy="285" r="8" fill="#ffffff" opacity="0.3"/>
  
  <!-- Veins/tendrils -->
  <g stroke="#ff0066" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 200 300 Q 250 280 280 300"/>
    <path d="M 200 300 Q 250 320 280 300"/>
    <path d="M 600 300 Q 550 280 520 300"/>
    <path d="M 600 300 Q 550 320 520 300"/>
    <path d="M 400 180 Q 380 220 400 240"/>
    <path d="M 400 180 Q 420 220 400 240"/>
    <path d="M 400 420 Q 380 380 400 360"/>
    <path d="M 400 420 Q 420 380 400 360"/>
  </g>
  
  <!-- Small eyes watching -->
  <g opacity="0.3">
    <ellipse cx="100" cy="100" rx="30" ry="18" fill="none" stroke="#ff00aa" stroke-width="1"/>
    <circle cx="100" cy="100" r="8" fill="#ff00aa" opacity="0.5"/>
    
    <ellipse cx="700" cy="100" rx="30" ry="18" fill="none" stroke="#ff00aa" stroke-width="1"/>
    <circle cx="700" cy="100" r="8" fill="#ff00aa" opacity="0.5"/>
    
    <ellipse cx="100" cy="500" rx="30" ry="18" fill="none" stroke="#ff00aa" stroke-width="1"/>
    <circle cx="100" cy="500" r="8" fill="#ff00aa" opacity="0.5"/>
    
    <ellipse cx="700" cy="500" rx="30" ry="18" fill="none" stroke="#ff00aa" stroke-width="1"/>
    <circle cx="700" cy="500" r="8" fill="#ff00aa" opacity="0.5"/>
  </g>
</svg>

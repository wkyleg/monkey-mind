<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="isolationDark" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Base -->
  <rect width="800" height="600" fill="url(#isolationDark)"/>
  
  <!-- Small room walls -->
  <rect x="200" y="150" width="400" height="300" fill="none" stroke="#334455" stroke-width="3" opacity="0.5"/>
  
  <!-- Corner shadows -->
  <polygon points="200,150 250,180 250,420 200,450" fill="#050508" opacity="0.5"/>
  <polygon points="600,150 550,180 550,420 600,450" fill="#050508" opacity="0.5"/>
  
  <!-- Single dim light -->
  <ellipse cx="400" cy="100" rx="40" ry="15" fill="#ffcc77" opacity="0.1"/>
  <line x1="400" y1="100" x2="400" y2="150" stroke="#ffcc77" stroke-width="1" opacity="0.3"/>
  
  <!-- Text scratched on wall -->
  <g fill="#445566" font-family="serif" opacity="0.4">
    <text x="220" y="300" font-size="14" transform="rotate(-5 220 300)">day 47</text>
    <text x="250" y="380" font-size="12" transform="rotate(3 250 380)">still here</text>
  </g>
  
  <!-- Loneliness circles -->
  <circle cx="400" cy="300" r="50" fill="none" stroke="#556677" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="300" r="80" fill="none" stroke="#556677" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="300" r="110" fill="none" stroke="#556677" stroke-width="1" opacity="0.1"/>
</svg>

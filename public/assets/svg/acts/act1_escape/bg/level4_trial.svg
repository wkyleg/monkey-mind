<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="trialGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0505;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="800" height="600" fill="url(#trialGradient)"/>
  
  <!-- Wooden benches/pews -->
  <g fill="#2a1a10" stroke="#3d2a1a" stroke-width="1">
    <rect x="100" y="400" width="250" height="30"/>
    <rect x="100" y="450" width="250" height="30"/>
    <rect x="100" y="500" width="250" height="30"/>
    <rect x="450" y="400" width="250" height="30"/>
    <rect x="450" y="450" width="250" height="30"/>
    <rect x="450" y="500" width="250" height="30"/>
  </g>
  
  <!-- Judge's podium -->
  <rect x="300" y="80" width="200" height="120" fill="#3d2a1a" stroke="#4d3a2a" stroke-width="2"/>
  <rect x="320" y="100" width="160" height="80" fill="#2a1a10"/>
  
  <!-- Gavel -->
  <g transform="translate(400, 140)">
    <rect x="-30" y="-5" width="60" height="10" fill="#5d4a3a"/>
    <rect x="-8" y="5" width="16" height="25" fill="#5d4a3a"/>
  </g>
  
  <!-- Accusatory pointing hands (stylized) -->
  <g fill="#aa8866" opacity="0.3">
    <polygon points="50,300 120,310 120,320 50,330"/>
    <polygon points="750,300 680,310 680,320 750,330"/>
  </g>
  
  <!-- Candle flames -->
  <g fill="#ff8844" opacity="0.4">
    <ellipse cx="150" cy="350" rx="5" ry="10"/>
    <ellipse cx="650" cy="350" rx="5" ry="10"/>
  </g>
</svg>

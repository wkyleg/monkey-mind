<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <pattern id="clinicalGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0f3460" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Base gradient -->
  <rect width="800" height="600" fill="url(#gridFade)"/>
  
  <!-- Clinical grid pattern -->
  <rect width="800" height="600" fill="url(#clinicalGrid)"/>
  
  <!-- Horizontal scan lines -->
  <g opacity="0.2">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#00ff88" stroke-width="1"/>
  </g>
  
  <!-- Data readout corners -->
  <g fill="none" stroke="#e94560" stroke-width="2" opacity="0.4">
    <path d="M 20 20 L 20 60 M 20 20 L 60 20"/>
    <path d="M 780 20 L 780 60 M 780 20 L 740 20"/>
    <path d="M 20 580 L 20 540 M 20 580 L 60 580"/>
    <path d="M 780 580 L 780 540 M 780 580 L 740 580"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffaa;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00ffaa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00ffaa;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Base -->
  <rect width="800" height="600" fill="#050510"/>
  
  <!-- Monitor frame top-left -->
  <rect x="50" y="50" width="180" height="120" fill="#0a1020" stroke="#00ffaa" stroke-width="1" opacity="0.7"/>
  <text x="60" y="75" fill="#00ffaa" font-family="monospace" font-size="10" opacity="0.8">NEURAL READINGS</text>
  <path d="M 60 90 Q 80 85 100 100 Q 120 110 140 95 Q 160 80 180 90 Q 200 100 220 85" fill="none" stroke="#00ffaa" stroke-width="1" opacity="0.6"/>
  <path d="M 60 120 Q 80 115 100 130 Q 120 140 140 125 Q 160 110 180 120 Q 200 130 220 115" fill="none" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  
  <!-- Monitor frame top-right -->
  <rect x="570" y="50" width="180" height="120" fill="#0a1020" stroke="#00ffaa" stroke-width="1" opacity="0.7"/>
  <text x="580" y="75" fill="#00ffaa" font-family="monospace" font-size="10" opacity="0.8">CONTAINMENT</text>
  <text x="580" y="95" fill="#e94560" font-family="monospace" font-size="12" opacity="0.9">BREACH DETECTED</text>
  <rect x="580" y="110" width="160" height="8" fill="#0a0a0a" stroke="#e94560" stroke-width="1"/>
  <rect x="580" y="110" width="120" height="8" fill="#e94560" opacity="0.6"/>
  
  <!-- Scan line effect -->
  <rect x="0" y="200" width="800" height="20" fill="url(#scanLine)"/>
  
  <!-- Warning markers -->
  <g opacity="0.4">
    <circle cx="100" cy="500" r="30" fill="none" stroke="#e94560" stroke-width="2"/>
    <text x="100" y="508" fill="#e94560" font-family="monospace" font-size="18" text-anchor="middle">!</text>
    <circle cx="700" cy="500" r="30" fill="none" stroke="#e94560" stroke-width="2"/>
    <text x="700" y="508" fill="#e94560" font-family="monospace" font-size="18" text-anchor="middle">!</text>
  </g>
</svg>

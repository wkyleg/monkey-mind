<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="droneGlow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cage body -->
  <rect x="15" y="15" width="30" height="30" fill="#0a1520" stroke="#00ffaa" stroke-width="2"/>
  
  <!-- Cage bars -->
  <g stroke="#00ffaa" stroke-width="1" opacity="0.7">
    <line x1="20" y1="15" x2="20" y2="45"/>
    <line x1="25" y1="15" x2="25" y2="45"/>
    <line x1="30" y1="15" x2="30" y2="45"/>
    <line x1="35" y1="15" x2="35" y2="45"/>
    <line x1="40" y1="15" x2="40" y2="45"/>
  </g>
  
  <!-- Propeller top -->
  <ellipse cx="30" cy="10" rx="12" ry="3" fill="none" stroke="#00ccff" stroke-width="1.5" filter="url(#droneGlow2)"/>
  
  <!-- Sensor eye -->
  <circle cx="30" cy="30" r="6" fill="#0a1520" stroke="#ff4466" stroke-width="2"/>
  <circle cx="30" cy="30" r="2" fill="#ff4466" filter="url(#droneGlow2)"/>
  
  <!-- Status light -->
  <circle cx="30" cy="50" r="3" fill="#ff4466" filter="url(#droneGlow2)"/>
</svg>

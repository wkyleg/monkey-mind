<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <defs>
    <filter id="chaserGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chaserGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Arrow body pointing down -->
  <polygon points="25,45 10,20 18,20 18,5 32,5 32,20 40,20" 
           fill="url(#chaserGradient)" stroke="#e94560" stroke-width="2" 
           filter="url(#chaserGlow)"/>
  
  <!-- Tracking eye -->
  <circle cx="25" cy="12" r="5" fill="#1a1a2e" stroke="#00ff88" stroke-width="1"/>
  <circle cx="25" cy="12" r="2" fill="#00ff88"/>
  
  <!-- Speed lines -->
  <g stroke="#e94560" stroke-width="1" opacity="0.5">
    <line x1="15" y1="8" x2="15" y2="0"/>
    <line x1="25" y1="5" x2="25" y2="-3"/>
    <line x1="35" y1="8" x2="35" y2="0"/>
  </g>
  
  <!-- Lock-on indicator -->
  <g stroke="#e94560" stroke-width="1" fill="none" opacity="0.7">
    <circle cx="25" cy="35" r="4"/>
    <line x1="25" y1="29" x2="25" y2="31"/>
    <line x1="25" y1="39" x2="25" y2="41"/>
    <line x1="19" y1="35" x2="21" y2="35"/>
    <line x1="29" y1="35" x2="31" y2="35"/>
  </g>
</svg>

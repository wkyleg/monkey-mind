<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="accuserGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hooded figure -->
  <path d="M 15 55 L 20 20 Q 30 5 40 20 L 45 55 Z" fill="#1a0a0a" stroke="#8b4513" stroke-width="2"/>
  
  <!-- Hidden face (dark) -->
  <ellipse cx="30" cy="30" rx="10" ry="12" fill="#0a0505"/>
  
  <!-- Glowing accusatory eyes -->
  <g filter="url(#accuserGlow)">
    <circle cx="26" cy="28" r="3" fill="#ff4444"/>
    <circle cx="34" cy="28" r="3" fill="#ff4444"/>
  </g>
  
  <!-- Pointing finger emerging -->
  <g transform="translate(40, 40)">
    <polygon points="0,5 20,0 20,10" fill="#5a3a2a" stroke="#8b4513" stroke-width="1"/>
  </g>
  
  <!-- Accusation aura -->
  <g stroke="#ff4444" stroke-width="1" fill="none" opacity="0.3">
    <circle cx="30" cy="30" r="25"/>
    <circle cx="30" cy="30" r="30"/>
  </g>
</svg>

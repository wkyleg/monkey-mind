<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="flameGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4400;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8800;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- Flame shape -->
  <path d="M 30 5 
           Q 35 15 40 25 
           Q 50 35 45 45 
           Q 40 55 30 55 
           Q 20 55 15 45 
           Q 10 35 20 25 
           Q 25 15 30 5" 
        fill="url(#flameGrad2)" filter="url(#flameGlow)"/>
  
  <!-- Inner flame -->
  <path d="M 30 15 
           Q 33 22 35 28 
           Q 40 35 37 42 
           Q 35 48 30 48 
           Q 25 48 23 42 
           Q 20 35 25 28 
           Q 27 22 30 15" 
        fill="#ffcc00" opacity="0.6"/>
  
  <!-- Core -->
  <ellipse cx="30" cy="40" rx="5" ry="8" fill="#ffffff" opacity="0.4"/>
  
  <!-- Sparks -->
  <g fill="#ffcc00" opacity="0.8">
    <circle cx="20" cy="15" r="1.5"/>
    <circle cx="42" cy="18" r="1"/>
    <circle cx="15" cy="30" r="1"/>
    <circle cx="48" cy="28" r="1.5"/>
  </g>
</svg>

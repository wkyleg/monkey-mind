<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <filter id="hysteriaGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Swirling mass of faces -->
  <g fill="#2a1515" stroke="#aa4444" stroke-width="1">
    <circle cx="25" cy="20" r="10"/>
    <circle cx="38" cy="25" r="8"/>
    <circle cx="22" cy="38" r="9"/>
    <circle cx="40" cy="40" r="7"/>
    <circle cx="30" cy="30" r="12"/>
  </g>
  
  <!-- Multiple screaming mouths -->
  <g fill="#0a0505">
    <ellipse cx="30" cy="32" rx="4" ry="6"/>
    <ellipse cx="24" cy="22" rx="3" ry="4"/>
    <ellipse cx="38" cy="42" rx="2" ry="3"/>
    <ellipse cx="40" cy="27" rx="2" ry="3"/>
  </g>
  
  <!-- Wild eyes -->
  <g fill="#ff6666" filter="url(#hysteriaGlow)">
    <circle cx="26" cy="28" r="2"/>
    <circle cx="34" cy="28" r="2"/>
    <circle cx="20" cy="18" r="1.5"/>
    <circle cx="28" cy="18" r="1.5"/>
    <circle cx="36" cy="22" r="1.5"/>
    <circle cx="44" cy="25" r="1.5"/>
    <circle cx="18" cy="36" r="1.5"/>
    <circle cx="26" cy="42" r="1.5"/>
    <circle cx="38" cy="38" r="1.5"/>
  </g>
  
  <!-- Chaos lines -->
  <g stroke="#aa4444" stroke-width="1" opacity="0.4">
    <path d="M 10 10 Q 20 15 15 25" fill="none"/>
    <path d="M 50 15 Q 45 20 48 30" fill="none"/>
    <path d="M 8 45 Q 15 50 12 55" fill="none"/>
    <path d="M 52 48 Q 48 52 55 55" fill="none"/>
  </g>
</svg>

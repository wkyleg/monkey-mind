<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Floating gear enemy -->
  <g transform="translate(30,30)">
    <!-- Gear body -->
    <circle cx="0" cy="0" r="15" fill="#4a5568"/>
    
    <!-- Gear teeth -->
    <g fill="#708090">
      <rect x="-3" y="-20" width="6" height="8"/>
      <rect x="-3" y="-20" width="6" height="8" transform="rotate(45)"/>
      <rect x="-3" y="-20" width="6" height="8" transform="rotate(90)"/>
      <rect x="-3" y="-20" width="6" height="8" transform="rotate(135)"/>
      <rect x="-3" y="-20" width="6" height="8" transform="rotate(180)"/>
      <rect x="-3" y="-20" width="6" height="8" transform="rotate(225)"/>
      <rect x="-3" y="-20" width="6" height="8" transform="rotate(270)"/>
      <rect x="-3" y="-20" width="6" height="8" transform="rotate(315)"/>
    </g>
    
    <!-- Center hole with eye -->
    <circle cx="0" cy="0" r="6" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="4" fill="#ff0000">
      <animate attributeName="fill" values="#ff0000;#00ff00;#ff0000" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Rotation -->
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>

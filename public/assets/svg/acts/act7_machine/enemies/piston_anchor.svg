<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Piston hazard anchor -->
  <g transform="translate(30,30)">
    <!-- Cylinder housing -->
    <rect x="-10" y="-20" width="20" height="25" fill="#4a5568" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Piston rod -->
    <rect x="-4" y="5" width="8" height="20" fill="#708090">
      <animate attributeName="height" values="20;10;20" dur="1s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Piston head -->
    <rect x="-8" y="25" width="16" height="8" fill="#2d3748">
      <animate attributeName="y" values="25;15;25" dur="1s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Hazard zone indicator -->
    <rect x="-15" y="30" width="30" height="5" fill="#ff0000" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Pressure gauge -->
    <circle cx="0" cy="-12" r="5" fill="#1a1a1a" stroke="#708090" stroke-width="1"/>
    <line x1="0" y1="-12" x2="3" y2="-14" stroke="#ff0000" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 0 -12;90 0 -12;0 0 -12" dur="1s" repeatCount="indefinite"/>
    </line>
    
    <!-- Steam vents -->
    <g fill="#888" opacity="0.4">
      <circle cx="-12" cy="0" r="3">
        <animate attributeName="opacity" values="0.4;0;0.4" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="0" r="3">
        <animate attributeName="opacity" values="0;0.4;0" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>

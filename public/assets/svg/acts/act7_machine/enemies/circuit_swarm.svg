<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Swarm of circuit components -->
  <g transform="translate(30,30)">
    <!-- Multiple small components -->
    
    <!-- Resistors -->
    <g fill="#8b4513">
      <rect x="-18" y="-8" width="10" height="4"/>
      <rect x="8" y="4" width="10" height="4"/>
    </g>
    <g stroke="#ffd700" stroke-width="1">
      <line x1="-20" y1="-6" x2="-18" y2="-6"/>
      <line x1="-8" y1="-6" x2="-6" y2="-6"/>
      <line x1="6" y1="6" x2="8" y2="6"/>
      <line x1="18" y1="6" x2="20" y2="6"/>
    </g>
    
    <!-- Capacitors -->
    <g stroke="#4a5568" stroke-width="2">
      <line x1="-5" y1="-15" x2="-5" y2="-10"/>
      <line x1="5" y1="-15" x2="5" y2="-10"/>
      <line x1="10" y1="10" x2="10" y2="15"/>
      <line x1="15" y1="10" x2="15" y2="15"/>
    </g>
    
    <!-- LEDs -->
    <g>
      <circle cx="-12" cy="10" r="3" fill="#ff0000">
        <animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-5" r="3" fill="#00ff00">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="15" cy="-10" r="3" fill="#0000ff">
        <animate attributeName="opacity" values="1;0.5;1" dur="0.7s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- IC chip (center) -->
    <rect x="-8" y="-3" width="16" height="10" fill="#1a1a1a"/>
    <g fill="#708090">
      <rect x="-10" y="-1" width="3" height="1"/>
      <rect x="-10" y="2" width="3" height="1"/>
      <rect x="-10" y="5" width="3" height="1"/>
      <rect x="7" y="-1" width="3" height="1"/>
      <rect x="7" y="2" width="3" height="1"/>
      <rect x="7" y="5" width="3" height="1"/>
    </g>
    
    <!-- Orbiting motion -->
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="pistonMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="50%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
  </defs>
  
  <!-- Industrial pistons -->
  <g opacity="0.3">
    <!-- Piston 1 -->
    <g transform="translate(60,0)">
      <rect x="-20" y="0" width="40" height="300" fill="url(#pistonMetal)"/>
      <rect x="-25" y="280" width="50" height="30" fill="#2d3748"/>
      <rect x="-15" y="0" width="30" height="20" fill="#2d3748"/>
      <animateTransform attributeName="transform" type="translate" values="60,0;60,50;60,0" dur="2s" repeatCount="indefinite"/>
    </g>
    
    <!-- Piston 2 -->
    <g transform="translate(150,100)">
      <rect x="-15" y="0" width="30" height="250" fill="url(#pistonMetal)"/>
      <rect x="-20" y="230" width="40" height="25" fill="#2d3748"/>
      <rect x="-12" y="0" width="24" height="15" fill="#2d3748"/>
      <animateTransform attributeName="transform" type="translate" values="150,100;150,50;150,100" dur="2.5s" repeatCount="indefinite"/>
    </g>
    
    <!-- Piston 3 -->
    <g transform="translate(250,50)">
      <rect x="-18" y="0" width="36" height="280" fill="url(#pistonMetal)"/>
      <rect x="-23" y="260" width="46" height="28" fill="#2d3748"/>
      <rect x="-14" y="0" width="28" height="18" fill="#2d3748"/>
      <animateTransform attributeName="transform" type="translate" values="250,50;250,100;250,50" dur="1.8s" repeatCount="indefinite"/>
    </g>
    
    <!-- Piston 4 -->
    <g transform="translate(340,0)">
      <rect x="-22" y="0" width="44" height="320" fill="url(#pistonMetal)"/>
      <rect x="-27" y="300" width="54" height="32" fill="#2d3748"/>
      <rect x="-17" y="0" width="34" height="22" fill="#2d3748"/>
      <animateTransform attributeName="transform" type="translate" values="340,0;340,80;340,0" dur="3s" repeatCount="indefinite"/>
    </g>
    
    <!-- Steam/exhaust -->
    <g fill="#888" opacity="0.4">
      <circle cx="60" cy="350" r="15">
        <animate attributeName="r" values="10;25;10" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="250" cy="380" r="12">
        <animate attributeName="r" values="8;20;8" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0;0.3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>

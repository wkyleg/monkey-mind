<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#708090"/>
      <stop offset="50%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  
  <!-- Industrial gear patterns -->
  <g fill="url(#steelGrad)" opacity="0.3">
    <!-- Large gear -->
    <g transform="translate(100,150)">
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#steelGrad)" stroke-width="15"/>
      <!-- Teeth -->
      <g>
        <rect x="-8" y="-75" width="16" height="20"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(30)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(60)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(90)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(120)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(150)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(180)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(210)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(240)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(270)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(300)"/>
        <rect x="-8" y="-75" width="16" height="20" transform="rotate(330)"/>
      </g>
      <circle cx="0" cy="0" r="20"/>
      <animateTransform attributeName="transform" type="rotate" from="0 100 150" to="360 100 150" dur="20s" repeatCount="indefinite"/>
    </g>
    
    <!-- Medium gear (counter-rotating) -->
    <g transform="translate(300,300)">
      <circle cx="0" cy="0" r="45" fill="none" stroke="url(#steelGrad)" stroke-width="12"/>
      <g>
        <rect x="-6" y="-57" width="12" height="15"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(40)"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(80)"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(120)"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(160)"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(200)"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(240)"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(280)"/>
        <rect x="-6" y="-57" width="12" height="15" transform="rotate(320)"/>
      </g>
      <circle cx="0" cy="0" r="15"/>
      <animateTransform attributeName="transform" type="rotate" from="360 300 300" to="0 300 300" dur="15s" repeatCount="indefinite"/>
    </g>
    
    <!-- Small gear -->
    <g transform="translate(200,480)">
      <circle cx="0" cy="0" r="30" fill="none" stroke="url(#steelGrad)" stroke-width="8"/>
      <g>
        <rect x="-4" y="-38" width="8" height="10"/>
        <rect x="-4" y="-38" width="8" height="10" transform="rotate(45)"/>
        <rect x="-4" y="-38" width="8" height="10" transform="rotate(90)"/>
        <rect x="-4" y="-38" width="8" height="10" transform="rotate(135)"/>
        <rect x="-4" y="-38" width="8" height="10" transform="rotate(180)"/>
        <rect x="-4" y="-38" width="8" height="10" transform="rotate(225)"/>
        <rect x="-4" y="-38" width="8" height="10" transform="rotate(270)"/>
        <rect x="-4" y="-38" width="8" height="10" transform="rotate(315)"/>
      </g>
      <circle cx="0" cy="0" r="10"/>
      <animateTransform attributeName="transform" type="rotate" from="0 200 480" to="360 200 480" dur="10s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>

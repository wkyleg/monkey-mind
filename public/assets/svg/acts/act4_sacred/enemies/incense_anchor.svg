<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <linearGradient id="brassBowl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#8b4513"/>
    </linearGradient>
  </defs>
  
  <!-- Incense burner (creates hazard field) -->
  <g transform="translate(30,35)">
    <!-- Bowl -->
    <ellipse cx="0" cy="5" rx="18" ry="8" fill="url(#brassBowl)"/>
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="#1a0a0a"/>
    
    <!-- Decorative rim -->
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#ffd700" stroke-width="2"/>
    
    <!-- Rising smoke (hazard field visual) -->
    <g opacity="0.6">
      <path d="M-5,-5 Q-8,-15 -3,-25" stroke="#daa520" stroke-width="3" fill="none">
        <animate attributeName="d" values="M-5,-5 Q-8,-15 -3,-25;M-5,-5 Q-2,-15 -7,-25;M-5,-5 Q-8,-15 -3,-25" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-5 Q3,-18 -2,-30" stroke="#b8860b" stroke-width="4" fill="none">
        <animate attributeName="d" values="M0,-5 Q3,-18 -2,-30;M0,-5 Q-3,-18 2,-30;M0,-5 Q3,-18 -2,-30" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <path d="M5,-5 Q8,-12 4,-22" stroke="#cd853f" stroke-width="2" fill="none">
        <animate attributeName="d" values="M5,-5 Q8,-12 4,-22;M5,-5 Q2,-12 7,-22;M5,-5 Q8,-12 4,-22" dur="1.8s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Glowing coals inside -->
    <g fill="#ff4400" filter="url(#holyGlow)">
      <circle cx="-5" cy="0" r="3">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="5" cy="0" r="2">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Stand/base -->
    <rect x="-3" y="12" width="6" height="8" fill="#8b4513"/>
    <ellipse cx="0" cy="20" rx="8" ry="3" fill="#8b4513"/>
  </g>
</svg>

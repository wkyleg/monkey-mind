<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
  </defs>
  
  <!-- Sacred mandala pattern -->
  <g transform="translate(200,300)" opacity="0.3">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
    
    <!-- Petal patterns -->
    <g fill="url(#goldGrad)">
      <g id="petalGroup">
        <ellipse cx="0" cy="-120" rx="15" ry="30"/>
      </g>
      <use href="#petalGroup" transform="rotate(30)"/>
      <use href="#petalGroup" transform="rotate(60)"/>
      <use href="#petalGroup" transform="rotate(90)"/>
      <use href="#petalGroup" transform="rotate(120)"/>
      <use href="#petalGroup" transform="rotate(150)"/>
      <use href="#petalGroup" transform="rotate(180)"/>
      <use href="#petalGroup" transform="rotate(210)"/>
      <use href="#petalGroup" transform="rotate(240)"/>
      <use href="#petalGroup" transform="rotate(270)"/>
      <use href="#petalGroup" transform="rotate(300)"/>
      <use href="#petalGroup" transform="rotate(330)"/>
    </g>
    
    <!-- Inner geometric pattern -->
    <g stroke="url(#goldGrad)" stroke-width="1" fill="none">
      <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"/>
      <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"/>
      <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20"/>
    </g>
    
    <!-- Center lotus -->
    <circle cx="0" cy="0" r="20" fill="url(#goldGrad)"/>
    <circle cx="0" cy="0" r="10" fill="#ffd700"/>
    
    <!-- Slow rotation -->
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="120s" repeatCount="indefinite" additive="sum"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <!-- Monkey Mind Logo -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="50%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <ellipse cx="128" cy="64" rx="120" ry="56" fill="none" stroke="url(#logoGrad)" stroke-width="1" opacity="0.3"/>
  
  <!-- Stylized monkey silhouette -->
  <g transform="translate(20, 20)">
    <!-- Ears -->
    <circle cx="10" cy="40" r="12" fill="#1a1a2e" stroke="#00ffaa" stroke-width="2"/>
    <circle cx="70" cy="40" r="12" fill="#1a1a2e" stroke="#00ffaa" stroke-width="2"/>
    
    <!-- Head -->
    <ellipse cx="40" cy="44" rx="28" ry="32" fill="#1a1a2e" stroke="url(#logoGrad)" stroke-width="3" filter="url(#logoGlow)"/>
    
    <!-- EEG helmet -->
    <path d="M14 36 Q40 12 66 36" stroke="#00ffaa" stroke-width="3" fill="none" filter="url(#logoGlow)"/>
    <circle cx="20" cy="32" r="4" fill="#00ffaa" filter="url(#logoGlow)"/>
    <circle cx="40" cy="20" r="4" fill="#ff00aa" filter="url(#logoGlow)"/>
    <circle cx="60" cy="32" r="4" fill="#00aaff" filter="url(#logoGlow)"/>
    
    <!-- Eyes -->
    <ellipse cx="30" cy="42" rx="6" ry="7" fill="#00ffaa" filter="url(#logoGlow)"/>
    <ellipse cx="50" cy="42" rx="6" ry="7" fill="#ff00aa" filter="url(#logoGlow)"/>
    <circle cx="30" cy="43" r="3" fill="#ffffff"/>
    <circle cx="50" cy="43" r="3" fill="#ffffff"/>
    
    <!-- Grin -->
    <path d="M28 60 Q40 70 52 60" stroke="#00ffaa" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Text: MONKEY MIND -->
  <text x="128" y="100" font-size="24" fill="url(#logoGrad)" text-anchor="middle" font-family="sans-serif" font-weight="bold" filter="url(#logoGlow)">MONKEY MIND</text>
  
  <!-- Subtitle -->
  <text x="128" y="118" font-size="10" fill="#ff00aa" text-anchor="middle" font-family="sans-serif" letter-spacing="4">INNER INVADERS</text>
</svg>

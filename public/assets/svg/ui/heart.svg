<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Heart/Life Icon -->
  <defs>
    <radialGradient id="heartGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <filter id="heartGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Heart shape -->
  <path d="M12 21 C6 16 2 12 2 8 C2 4 5 2 8 2 C10 2 12 4 12 4 C12 4 14 2 16 2 C19 2 22 4 22 8 C22 12 18 16 12 21 Z" 
        fill="url(#heartGrad)" 
        stroke="#aa0000" 
        stroke-width="1"
        filter="url(#heartGlow)"/>
  
  <!-- Highlight -->
  <ellipse cx="8" cy="7" rx="2" ry="1.5" fill="#ffffff" opacity="0.5"/>
</svg>

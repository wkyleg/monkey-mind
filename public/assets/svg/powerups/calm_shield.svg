<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Calm Shield Powerup -->
  <defs>
    <radialGradient id="shieldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66ccff"/>
      <stop offset="100%" stop-color="#0066aa"/>
    </radialGradient>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#00aaff" stroke-width="1" opacity="0.4" filter="url(#shieldGlow)"/>
  
  <!-- Shield shape -->
  <path d="M16 4 L26 10 L26 18 Q26 26 16 30 Q6 26 6 18 L6 10 Z" 
        fill="url(#shieldGrad)" 
        stroke="#00ccff" 
        stroke-width="2"
        filter="url(#shieldGlow)"/>
  
  <!-- Inner pattern -->
  <path d="M16 8 L22 12 L22 18 Q22 24 16 26 Q10 24 10 18 L10 12 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="1"
        opacity="0.5"/>
  
  <!-- Calm symbol (wave) -->
  <path d="M11 16 Q13 14 16 16 Q19 18 21 16" stroke="#ffffff" stroke-width="2" fill="none"/>
  
  <!-- Sparkles -->
  <circle cx="12" cy="10" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="20" cy="10" r="1" fill="#ffffff" opacity="0.8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Passion Fury Powerup (Rapid Fire) -->
  <defs>
    <radialGradient id="furyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <filter id="furyGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fire aura -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ff3300" stroke-width="1" opacity="0.4" filter="url(#furyGlow)"/>
  
  <!-- Main circle -->
  <circle cx="16" cy="16" r="12" fill="url(#furyGrad)" stroke="#ff0000" stroke-width="2" filter="url(#furyGlow)"/>
  
  <!-- Fire icon -->
  <path d="M16 6 Q20 12 18 16 Q22 14 20 20 Q24 18 20 26 L16 24 L12 26 Q8 18 12 20 Q10 14 14 16 Q12 12 16 6 Z" 
        fill="#ffff00" 
        stroke="#ff6600" 
        stroke-width="0.5"/>
  
  <!-- Inner flame -->
  <path d="M16 10 Q18 14 17 16 Q19 15 18 20 L16 18 L14 20 Q13 15 15 16 Q14 14 16 10 Z" 
        fill="#ffffff" 
        opacity="0.8"/>
  
  <!-- Triple banana indicator -->
  <text x="16" y="28" font-size="6" fill="#ffffff" text-anchor="middle" font-weight="bold">x3</text>
</svg>

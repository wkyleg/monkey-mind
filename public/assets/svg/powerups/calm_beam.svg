<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Calm Beam Powerup -->
  <defs>
    <linearGradient id="beamPowerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="beamPowerGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#00aaff" stroke-width="1" opacity="0.3"/>
  
  <!-- Main circle -->
  <circle cx="16" cy="16" r="12" fill="#0a1a2a" stroke="#00ffff" stroke-width="2" filter="url(#beamPowerGlow)"/>
  
  <!-- Beam icon (vertical line with glow) -->
  <rect x="14" y="6" width="4" height="20" fill="url(#beamPowerGrad)" filter="url(#beamPowerGlow)"/>
  
  <!-- Core -->
  <rect x="15" y="6" width="2" height="20" fill="#ffffff"/>
  
  <!-- Energy rings -->
  <circle cx="16" cy="10" r="2" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
  <circle cx="16" cy="16" r="2" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
  <circle cx="16" cy="22" r="2" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
</svg>

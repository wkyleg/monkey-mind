<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Subject 7 - Escaped Lab Experiment - Default State -->
  <!-- Angular, menacing, industrial cyborg primate -->
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3a2a"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="50%" stop-color="#6a6a7a"/>
      <stop offset="100%" stop-color="#3a3a4a"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyanGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Angular skull plate / helmet -->
  <path d="M12 28 L16 12 L32 6 L48 12 L52 28 L48 36 L16 36 Z" 
        fill="#1a1a24" stroke="#00cccc" stroke-width="1"/>
  
  <!-- Exposed circuitry on skull -->
  <g stroke="#00cccc" stroke-width="0.5" fill="none" opacity="0.6">
    <path d="M20 14 L24 18 L20 22"/>
    <path d="M44 14 L40 18 L44 22"/>
    <line x1="28" y1="10" x2="28" y2="18"/>
    <line x1="36" y1="10" x2="36" y2="18"/>
  </g>
  
  <!-- Gaunt face structure -->
  <path d="M18 28 L22 36 L32 42 L42 36 L46 28 L42 24 L22 24 Z" 
        fill="url(#skinGrad)" stroke="#3a2a1a" stroke-width="0.5"/>
  
  <!-- Sunken cheeks -->
  <path d="M20 30 Q24 34 22 38" fill="none" stroke="#2a1a0a" stroke-width="1" opacity="0.5"/>
  <path d="M44 30 Q40 34 42 38" fill="none" stroke="#2a1a0a" stroke-width="1" opacity="0.5"/>
  
  <!-- Metal jaw implant -->
  <path d="M22 40 L26 46 L32 48 L38 46 L42 40" 
        fill="url(#metalGrad)" stroke="#5a5a6a" stroke-width="0.5"/>
  <g fill="#333">
    <circle cx="24" cy="42" r="1"/>
    <circle cx="32" cy="44" r="1"/>
    <circle cx="40" cy="42" r="1"/>
  </g>
  
  <!-- Left eye - organic, damaged, bloodshot -->
  <ellipse cx="24" cy="30" rx="5" ry="4" fill="#e8e0d8" stroke="#4a3a2a" stroke-width="0.5"/>
  <circle cx="24" cy="30" r="2.5" fill="#2a1a0a"/>
  <circle cx="24" cy="30" r="1" fill="#000"/>
  <circle cx="23" cy="29" r="0.4" fill="#fff"/>
  <!-- Heavy bloodshot veins -->
  <g stroke="#cc2222" stroke-width="0.4" opacity="0.8">
    <line x1="19" y1="28" x2="22" y2="29"/>
    <line x1="19" y1="32" x2="22" y2="31"/>
    <line x1="27" y1="27" x2="25" y2="29"/>
    <line x1="27" y1="33" x2="25" y2="31"/>
  </g>
  
  <!-- Right eye - cybernetic, RED (menacing) -->
  <circle cx="40" cy="30" r="5" fill="#0a0a0f" stroke="#ff0033" stroke-width="1.5" filter="url(#redGlow)"/>
  <circle cx="40" cy="30" r="3" fill="#ff0033" filter="url(#redGlow)"/>
  <circle cx="40" cy="30" r="1.5" fill="#ff3366"/>
  <circle cx="40" cy="30" r="0.5" fill="#ffffff"/>
  <!-- Targeting reticle -->
  <g stroke="#ff0033" stroke-width="0.5" opacity="0.8">
    <line x1="40" y1="24" x2="40" y2="27"/>
    <line x1="40" y1="33" x2="40" y2="36"/>
    <line x1="34" y1="30" x2="37" y2="30"/>
    <line x1="43" y1="30" x2="46" y2="30"/>
  </g>
  
  <!-- Torn ears with implants -->
  <path d="M8 22 L12 16 L16 20 L14 28 L10 26 Z" fill="url(#skinGrad)" stroke="#3a2a1a" stroke-width="0.5"/>
  <circle cx="12" cy="22" r="2" fill="#1a1a24" stroke="#00cccc" stroke-width="0.5"/>
  <path d="M56 22 L52 16 L48 20 L50 28 L54 26 Z" fill="url(#skinGrad)" stroke="#3a2a1a" stroke-width="0.5"/>
  <circle cx="52" cy="22" r="2" fill="#1a1a24" stroke="#00cccc" stroke-width="0.5"/>
  
  <!-- EEG nodes on skull -->
  <g filter="url(#cyanGlow)">
    <circle cx="20" cy="14" r="2.5" fill="#0a0a14" stroke="#00cccc" stroke-width="1"/>
    <circle cx="44" cy="14" r="2.5" fill="#0a0a14" stroke="#00cccc" stroke-width="1"/>
    <circle cx="32" cy="8" r="2.5" fill="#0a0a14" stroke="#00cccc" stroke-width="1"/>
  </g>
  
  <!-- Dangling cables -->
  <path d="M20 16 Q16 22 14 28" stroke="#00cccc" stroke-width="1" fill="none"/>
  <path d="M44 16 Q48 22 50 28" stroke="#00cccc" stroke-width="1" fill="none"/>
  <path d="M32 10 Q28 16 26 20" stroke="#ff3333" stroke-width="1" fill="none"/>
  
  <!-- Sparking damaged cable -->
  <g filter="url(#redGlow)">
    <circle cx="26" cy="20" r="1.5" fill="#ffff00"/>
    <line x1="24" y1="18" x2="23" y2="16" stroke="#ffff00" stroke-width="0.5"/>
    <line x1="28" y1="18" x2="29" y2="16" stroke="#ffff00" stroke-width="0.5"/>
    <line x1="25" y1="22" x2="24" y2="24" stroke="#ffff00" stroke-width="0.5"/>
  </g>
  
  <!-- Grimace mouth -->
  <path d="M28 46 L30 44 L32 46 L34 44 L36 46" stroke="#1a0a0a" stroke-width="1.5" fill="none"/>
  
  <!-- Surgical scars -->
  <g stroke="#6a4a4a" stroke-width="1" opacity="0.7">
    <line x1="32" y1="20" x2="32" y2="26"/>
    <line x1="30" y1="22" x2="34" y2="22"/>
    <line x1="30" y1="24" x2="34" y2="24"/>
  </g>
  
  <!-- Exposed metal on forehead -->
  <rect x="28" y="16" width="8" height="4" fill="url(#metalGrad)" stroke="#5a5a6a" stroke-width="0.3"/>
  
  <!-- ID tag -->
  <rect x="46" y="38" width="10" height="6" fill="#1a1a24" stroke="#ff0033" stroke-width="0.5"/>
  <text x="51" y="43" font-family="monospace" font-size="4" fill="#ff0033" text-anchor="middle">7</text>
</svg>

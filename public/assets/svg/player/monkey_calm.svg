<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Subject 7 - Calm State (Shield Active) -->
  <!-- Cold blue glow, focused, calculating -->
  <defs>
    <linearGradient id="skinGradCalm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
    <linearGradient id="metalGradCalm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a5a6a"/>
      <stop offset="50%" stop-color="#6a7a8a"/>
      <stop offset="100%" stop-color="#3a4a5a"/>
    </linearGradient>
    <filter id="calmGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield aura -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#0088cc" stroke-width="2" opacity="0.4" filter="url(#shieldGlow)"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00ccff" stroke-width="1" opacity="0.3"/>
  
  <!-- Angular skull plate / helmet -->
  <path d="M12 28 L16 12 L32 6 L48 12 L52 28 L48 36 L16 36 Z" 
        fill="#1a1a2e" stroke="#0088cc" stroke-width="1.5" filter="url(#calmGlow)"/>
  
  <!-- Exposed circuitry on skull (blue) -->
  <g stroke="#0088cc" stroke-width="0.5" fill="none" opacity="0.8">
    <path d="M20 14 L24 18 L20 22"/>
    <path d="M44 14 L40 18 L44 22"/>
    <line x1="28" y1="10" x2="28" y2="18"/>
    <line x1="36" y1="10" x2="36" y2="18"/>
  </g>
  
  <!-- Gaunt face structure -->
  <path d="M18 28 L22 36 L32 42 L42 36 L46 28 L42 24 L22 24 Z" 
        fill="url(#skinGradCalm)" stroke="#3a3a4a" stroke-width="0.5"/>
  
  <!-- Sunken cheeks -->
  <path d="M20 30 Q24 34 22 38" fill="none" stroke="#2a2a3a" stroke-width="1" opacity="0.5"/>
  <path d="M44 30 Q40 34 42 38" fill="none" stroke="#2a2a3a" stroke-width="1" opacity="0.5"/>
  
  <!-- Metal jaw implant -->
  <path d="M22 40 L26 46 L32 48 L38 46 L42 40" 
        fill="url(#metalGradCalm)" stroke="#6a7a8a" stroke-width="0.5"/>
  <g fill="#333">
    <circle cx="24" cy="42" r="1"/>
    <circle cx="32" cy="44" r="1"/>
    <circle cx="40" cy="42" r="1"/>
  </g>
  
  <!-- Left eye - calm, focused -->
  <ellipse cx="24" cy="30" rx="5" ry="4" fill="#d8e8f0" stroke="#4a5a6a" stroke-width="0.5"/>
  <circle cx="24" cy="30" r="2.5" fill="#1a2a3a"/>
  <circle cx="24" cy="30" r="1" fill="#000"/>
  <circle cx="23" cy="29" r="0.4" fill="#fff"/>
  
  <!-- Right eye - cybernetic, BLUE (calm mode) -->
  <circle cx="40" cy="30" r="5" fill="#0a0a1a" stroke="#0088cc" stroke-width="1.5" filter="url(#calmGlow)"/>
  <circle cx="40" cy="30" r="3" fill="#0088cc" filter="url(#calmGlow)"/>
  <circle cx="40" cy="30" r="1.5" fill="#00ccff"/>
  <circle cx="40" cy="30" r="0.5" fill="#ffffff"/>
  <!-- Targeting reticle -->
  <g stroke="#0088cc" stroke-width="0.5" opacity="0.8">
    <line x1="40" y1="24" x2="40" y2="27"/>
    <line x1="40" y1="33" x2="40" y2="36"/>
    <line x1="34" y1="30" x2="37" y2="30"/>
    <line x1="43" y1="30" x2="46" y2="30"/>
  </g>
  
  <!-- Torn ears with implants -->
  <path d="M8 22 L12 16 L16 20 L14 28 L10 26 Z" fill="url(#skinGradCalm)" stroke="#3a3a4a" stroke-width="0.5"/>
  <circle cx="12" cy="22" r="2" fill="#1a1a2e" stroke="#0088cc" stroke-width="0.5"/>
  <path d="M56 22 L52 16 L48 20 L50 28 L54 26 Z" fill="url(#skinGradCalm)" stroke="#3a3a4a" stroke-width="0.5"/>
  <circle cx="52" cy="22" r="2" fill="#1a1a2e" stroke="#0088cc" stroke-width="0.5"/>
  
  <!-- EEG nodes on skull (blue glow) -->
  <g filter="url(#calmGlow)">
    <circle cx="20" cy="14" r="2.5" fill="#0a0a1a" stroke="#0088cc" stroke-width="1"/>
    <circle cx="44" cy="14" r="2.5" fill="#0a0a1a" stroke="#0088cc" stroke-width="1"/>
    <circle cx="32" cy="8" r="2.5" fill="#0a0a1a" stroke="#0088cc" stroke-width="1"/>
  </g>
  
  <!-- Dangling cables (blue) -->
  <path d="M20 16 Q16 22 14 28" stroke="#0088cc" stroke-width="1" fill="none"/>
  <path d="M44 16 Q48 22 50 28" stroke="#0088cc" stroke-width="1" fill="none"/>
  <path d="M32 10 Q28 16 26 20" stroke="#0088cc" stroke-width="1" fill="none"/>
  
  <!-- Calm expression -->
  <path d="M28 46 L36 46" stroke="#1a2a3a" stroke-width="1.5" fill="none"/>
  
  <!-- Surgical scars -->
  <g stroke="#5a6a7a" stroke-width="1" opacity="0.5">
    <line x1="32" y1="20" x2="32" y2="26"/>
    <line x1="30" y1="22" x2="34" y2="22"/>
    <line x1="30" y1="24" x2="34" y2="24"/>
  </g>
  
  <!-- Exposed metal on forehead -->
  <rect x="28" y="16" width="8" height="4" fill="url(#metalGradCalm)" stroke="#6a7a8a" stroke-width="0.3"/>
  
  <!-- ID tag -->
  <rect x="46" y="38" width="10" height="6" fill="#1a1a2e" stroke="#0088cc" stroke-width="0.5"/>
  <text x="51" y="43" font-family="monospace" font-size="4" fill="#0088cc" text-anchor="middle">7</text>
</svg>
